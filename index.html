2","s":"tem","lido":true},{"t":"Diamante Dourado Vol. 1","s":"tem","lido":true},{"t":"Diamante Dourado Vol. 2","s":"tem","lido":true},{"t":"Joias da Alcateia (Temise)","s":"tem","lido":true}],"resumo":"Em um mundo de lobisomens e clãs rivais, uma jovem descobre que seu destino está ligado ao alfa mais poderoso e mais perigoso de todos. Laura Reggiani, autora brasileira, constrói uma romantasia de mundo sobrenatural com um romance intenso e bem construído. A série é conhecida pela química entre os protagonistas e pelo worldbuilding de alcatéias e hierarquias de poder. Um fenômeno da literatura brasileira de fantasia."},{"serie":"Seis de Corvos","autor":"Leigh Bardugo","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":5,"status":"completa","seq":[{"t":"Six of Crows","s":"tem","lido":false},{"t":"Crooked Kingdom","s":"tem","lido":false}],"resumo":"Na perigosa cidade portuária de Ketterdam, Kaz Brekker monta uma equipe improvável para o golpe mais impossível do mundo: invadir a fortaleza mais segura já construída. Leigh Bardugo criou personagens com histórias individuais tão ricas quanto a missão coletiva. Considerada por muitos a melhor obra do universo Grisha. A construção dos golpes e as reviravoltas são de tirar o fôlego."},{"serie":"Strange the Dreamer","autor":"Laini Taylor","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Um Estranho Sonhador","s":"tem","lido":false},{"t":"A Musa dos Pesadelos (#2)","s":"tem","lido":false}],"resumo":"Lazlo Strange é um bibliotecário sonhador obcecado com a cidade lendária de Weep — cujo nome todos misteriosamente esqueceram. Quando uma expedição parte para lá, ele consegue uma vaga improvável. No destino, ele encontra Sarai, uma jovem com poderes de sonho, e um segredo sombrio que paira literalmente sobre a cidade. O romance entre o sonhador e a filha dos deuses é um dos mais belos da fantasia recente."},{"serie":"Suicidas","autor":"Raphael Montes","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Suicidas","s":"tem","lido":false}],"resumo":"Uma jovem que tenta se matar encontra um estranho que lhe oferece um pacto perturbador: ele a ajudará a morrer da forma que ela quiser, mas ela precisa ajudá-lo a criar a morte perfeita para outras pessoas. Raphael Montes, autor brasileiro, cria um thriller sobre obsessão e manipulação que não se deixa categorizar facilmente. Perturbador e impossível de esquecer. Uma das obras mais controversas da literatura brasileira contemporânea."},{"serie":"Sussurros do Passado","autor":"Charlie Donlea","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Sussurros do Passado","s":"tem","lido":false}],"resumo":"Uma médica perde a memória após um acidente e começa a suspeitar que os que dizem querer ajudá-la são os que mais têm a ganhar com seu esquecimento. Charlie Donlea usa a amnésia como mecanismo de suspense de forma elegante. A incerteza entre o que é real e o que foi plantado é o coração do thriller. A resolução é satisfatória e surpreendente."},{"serie":"Os Seis de Atlas","autor":"Olivie Blake","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":7,"status":"completa","seq":[{"t":"Os Seis de Atlas (#1)","s":"tem","lido":false},{"t":"O Paradoxo de Atlas (#2)","s":"tem","lido":false},{"t":"O Complexo de Atlas (#3)","s":"tem","lido":false}],"resumo":"Seis prodígios mágicos são recrutados para uma sociedade secreta que guarda o conhecimento mais perigoso do mundo. Cada um tem seus próprios motivos — e sua própria agenda. Em um ambiente de luxo e paranoia, ninguém é o que parece e a traição está sempre à espreita. Olivie Blake é conhecida pela prosa densa e irônica e pelo elenco de personagens moralmente ambíguos."},{"serie":"The Hierarchy","autor":"James Islington","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":17,"status":"aguarda","seq":[{"t":"A Vontade de Muitos (#1)","s":"tem","lido":false},{"t":"Livro 2 (não publicado)","s":"lan","lido":false},{"t":"Livro 3 (não publicado)","s":"lan","lido":false}],"resumo":"Davian é um estudante de magia que falhou em todos os testes — mas esconde um poder que não deveria existir. Em um mundo onde laços mágicos controlam a hierarquia social, ele é forçado a navegar em uma conspiração que pode destruir o sistema que rege tudo. A série é comparada a Patrick Rothfuss pelo sistema de magia complexo. James Islington é uma das revelações mais promissoras da fantasia épica recente."},{"serie":"The Housemaid","autor":"Freida McFadden","tipo":"serie","genero":"suspense","plano":null,"status":"completa","seq":[{"t":"A Empregada","s":"tem","lido":false},{"t":"O Segredo da Empregada","s":"tem","lido":false}],"resumo":"Millie aceita o emprego de empregada em uma mansão aparentemente perfeita. A patroa tem segredos, o marido tem segredos, e a casa tem um passado que nenhum dos dois quer revelar. Freida McFadden usa narrativa dupla — passado e presente — para revelar quem é realmente vítima e quem é predador. A reviravolta do primeiro livro é definitória para o gênero."},{"serie":"The Last City","autor":"Kayla Edwards","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"City of Gods and Monsters","s":"tem","lido":false},{"t":"City of Souls and Sinners","s":"tem","lido":false},{"t":"City of Lies and Legends","s":"tem","lido":false}],"resumo":"Em uma cidade onde humanos e criaturas sobrenaturais coexistem em tensão frágil, uma jovem caçadora se vê envolvida em uma conspiração que pode destruir o frágil equilíbrio. Kayla Edwards constrói uma fantasia urbana com personagens carismáticos e ação bem orquestrada. O romance entre a protagonista e um dos seres que ela deveria caçar é central para a narrativa. Uma série de fantasia urbana bem construída."},{"serie":"Tiger Saga","autor":"Colleen Houck","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"A Maldição do Tigre","s":"tem","lido":true},{"t":"O Despertar do Príncipe","s":"tem","lido":true},{"t":"O Coração da Esfinge","s":"tem","lido":true},{"t":"A Coroa da Vingança","s":"tem","lido":true}],"resumo":"Kelsey Hayes é escolhida para uma profecia mágica que a envolve com dois tigres amaldiçoados: Ren e Kishan. Para quebrar a maldição, ela precisa completar tarefas épicas inspiradas na mitologia hindu. A série mistura folclore asiático com aventura e um triângulo amoroso apaixonante. A protagonista é corajosa e o worldbuilding é rico em referências culturais genuínas."},{"serie":"Teia de Mentiras","autor":"Sophie Stava","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Teia de Mentiras","s":"tem","lido":false}],"resumo":"Em um mundo de cortes feéricas onde a política é uma arte mortal, uma jovem diplomata precisa negociar um acordo impossível sem perder a vida. Sophie Stava constrói uma fantasia política com personagens que navegam entre traição e lealdade. O romance surge entre aliados que não deveriam se aproximar. Um debut de fantasia com forte foco em intriga e manipulação."},{"serie":"Três","autor":"Valérie Perrin","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Três","s":"tem","lido":false}],"resumo":"Uma mulher madura olha para trás e reflete sobre os três amores que definiram sua vida. Valérie Perrin escreve com a mesma delicadeza de Flores do Cemitério — devagar, melancólica e profundamente humana. O romance francês é sobre tempo, escolha e o que resta quando tudo passa. Uma leitura que exige pausa e contemplação."},{"serie":"Trilogia Grisha","autor":"Leigh Bardugo","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Sombra e Ossos","s":"tem","lido":true},{"t":"Sol e Tormenta","s":"tem","lido":true},{"t":"Ruína e Ascensão","s":"tem","lido":true}],"resumo":"Alina Starkov é uma soldada órfã que descobre ter poderes de luz únicos durante um ataque de criaturas das trevas. Levada para aprender com o misterioso Darkling, ela descobre que seu papel no mundo é maior e mais perigoso do que imagina. O Darkling é um dos vilões mais icônicos da fantasia YA. A série é o ponto de entrada para o vasto universo de Leigh Bardugo."},{"serie":"Trono de Vidro","autor":"Sarah J. Maas","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Trono de Vidro","s":"tem","lido":true},{"t":"Coroa de Meia-Noite","s":"tem","lido":true},{"t":"Herdeira do Fogo","s":"tem","lido":true},{"t":"Rainha das Sombras","s":"tem","lido":true},{"t":"Império de Tempestades","s":"tem","lido":true},{"t":"Torre do Amanhecer","s":"tem","lido":true},{"t":"Reino do Amanhecer","s":"tem","lido":true}],"resumo":"Celaena Sardothien é a assassina mais temida do mundo — e está presa numa mina de sal. Quando é oferecida a chance de ganhar a liberdade lutando em um torneio mortal, ela aceita. A série cresce progressivamente em escala épica, com foco em destino, sacrifício e a construção de um mundo em guerra. Sarah J. Maas constrói uma das protagonistas mais complexas e amadas da fantasia YA."},{"serie":"Uma Chama Entre as Cinzas","autor":"Sabaa Tahir","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":12,"status":"completa","seq":[{"t":"Uma Chama Entre as Cinzas","s":"tem","lido":false},{"t":"Uma Tocha Contra a Noite","s":"tem","lido":false},{"t":"Uma Estrela Flamejante","s":"tem","lido":false},{"t":"Uma Aurora Resplandecente","s":"tem","lido":false}],"resumo":"Laia é uma escrava que se infiltra na academia militar mais brutal do Império para salvar seu irmão. Elias é o soldado mais promissor dessa mesma academia, que sonha em desertar. Os caminhos dos dois se cruzam em um mundo de opressão, magia e rebelião. Sabaa Tahir escreve com intensidade emocional e não tem medo de consequências reais para seus personagens."},{"serie":"Uma Coroa de Hera e Vidro","autor":"Claire Legrand","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Uma Coroa de Hera e Vidro","s":"tem","lido":false}],"resumo":"Em um mundo onde o medo é uma arma e os sonhos são literalmente capturados e vendidos, uma jovem bibliotecária descobre um poder proibido. Claire Legrand constrói um sistema de magia baseado em emoções e memórias com inventividade rara. A protagonista outsider que descobre que os mitos que catalogava são reais é o gancho inicial. Um romance de fantasia literária com forte elemento político."},{"serie":"Uma Dança de Mentiras","autor":"Brittney Arena","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Uma Dança de Mentiras","s":"tem","lido":false}],"resumo":"Uma espiona feérica precisa seduzir, mentir e sobreviver em uma corte de fantasia onde cada aliança é uma mentira e cada dança pode ser a última. A protagonista questionam para quem ela está realmente trabalhando conforme o romance avança. Brittney Arena mistura espionagem, identidade dupla e política feérica com romance tenso. O gancho é a revelação gradual de que os inimigos declarados podem ser os únicos aliados reais."},{"serie":"Uma Mulher na Escuridão","autor":"Charlie Donlea","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Uma Mulher na Escuridão","s":"tem","lido":false}],"resumo":"Uma mulher desaparece sem deixar rastros e um detetive privado é contratado para encontrá-la. Charlie Donlea constrói um thriller de investigação onde cada detalhe encontrado levanta mais perguntas. A construção gradual do que realmente aconteceu é executada com precisão. Uma leitura sólida para fãs do gênero."},{"serie":"Universo De Sangue e Cinzas","autor":"Jennifer L. Armentrout","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"1. De Sangue e Cinzas (Sangue e Cinzas #1)","s":"tem","lido":false},{"t":"2. Um Reino de Carne e Fogo (Sangue e Cinzas #2)","s":"tem","lido":false},{"t":"3. A Coroa de Ossos Dourados (Sangue e Cinzas #3)","s":"tem","lido":false},{"t":"4. Uma Sombra na Brasa (Carne e Fogo #1 — spin-off)","s":"tem","lido":false},{"t":"5. A Guerra das Duas Rainhas (Sangue e Cinzas #4)","s":"tem","lido":false},{"t":"6. Uma Luz na Chama (Carne e Fogo #2)","s":"tem","lido":false},{"t":"7. Uma Alma de Cinzas e Sangue (Sangue e Cinzas #5)","s":"tem","lido":false},{"t":"8. Um Fogo na Carne (Carne e Fogo #3)","s":"tem","lido":false},{"t":"9. Visões de Carne e Sangue (compêndio/extra)","s":"tem","lido":false}],"resumo":"Poppy é uma guerreira escolhida pelos deuses, mantida em isolamento e destinada a um sacrifício sagrado. Quando Hawke — seu guarda mais perigoso — entra em sua vida, tudo o que ela acreditava começa a desmoronar. A série de Jennifer L. Armentrout é um dos maiores fenômenos da romantasia dos últimos anos, com worldbuilding rico e reviravoltas de identidade impactantes. O romance é intenso e o universo se expande a cada volume."},{"serie":"Verity","autor":"Colleen Hoover","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Verity","s":"tem","lido":true}],"resumo":"Um escritor contratado para continuar a série de livros de uma autora paralítica encontra em sua casa um manuscrito autobiográfico que confessa crimes horríveis. Colleen Hoover joga com a questão: é um manuscrito real ou ficção? A tensão entre o narrador e a autora cria um suspense sufocante. A ambiguidade moral final é proposital — e perfeita."},{"serie":"Will Trent / Grant County","autor":"Karin Slaughter","tipo":"serie","genero":"suspense","plano":null,"status":"incompleta","seq":[{"t":"Gênese","s":"tem","lido":false},{"t":"Fissura","s":"tem","lido":false},{"t":"Destroçados","s":"tem","lido":false},{"t":"A Boa Filha","s":"tem","lido":false},{"t":"A Esposa Silenciosa","s":"tem","lido":false},{"t":"Queda","s":"tem","lido":true},{"t":"Esposa Perfeita","s":"tem","lido":false},{"t":"Ninguém Pode Saber","s":"tem","lido":false},{"t":"Depois Daquela Noite","s":"tem","lido":false},{"t":"Somos Todos Culpados","s":"tem","lido":false},{"t":"Por Que Mentimos","s":"tem","lido":false},{"t":"Outros títulos (verificar)","s":"falta","lido":false}],"resumo":"A médica legista Sara Linton e o agente Will Trent investigam crimes violentos na Georgia com uma dinâmica de parceria que evolui ao longo de muitos volumes. Karin Slaughter não poupa o leitor de violência e consequências reais. Personagens com profundidade emocional rara no gênero policial. A continuidade entre os volumes recompensa leitores que acompanham a série desde o início."},{"serie":"Zodiac Academy","autor":"Caroline Peckham & Susanne Valenti","tipo":"serie","genero":"fantasia","plano":"lendo","ordemSug":1,"status":"completa","seq":[{"t":"#1 The Awakening","s":"tem","lido":true},{"t":"#2 Ruthless Fae","s":"tem","lido":true},{"t":"#3 The Reckoning","s":"tem","lido":true},{"t":"#4 Shadow Princess","s":"tem","lido":true},{"t":"#5 Cursed Fates","s":"tem","lido":true},{"t":"#5.5 The Big A.S.S Party","s":"tem","lido":true},{"t":"#5.6 Seth on the Moon","s":"tem","lido":true},{"t":"#6 Fated Throne","s":"tem","lido":true},{"t":"#7 Heartless Sky","s":"tem","lido":true},{"t":"#8 Sorrow and Starlight","s":"tem","lido":true},{"t":"#8.5 Beyond the Veil","s":"tem","lido":true},{"t":"#9 Restless Stars","s":"tem","lido":true}],"resumo":"Darcy e Tory Vega descobrem que são princesas de um mundo de Fae — e são imediatamente enviadas para a academia mais brutal que existe. Os quatro príncipes da escola têm como missão fazê-las desistir. Caroline Peckham e Susanne Valenti criam um universo de astrologia, poderes elementais e política feérica. A série é conhecida pela intensidade emocional e pelos romances múltiplos ao longo dos volumes."},{"serie":"Reign of Remnants","autor":"Julie Johnson","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"As Teias do Vento (#1)","s":"tem","lido":false},{"t":"The Sea Spinner (#2)","s":"tem","lido":false},{"t":"Livro 3 (não anunciado)","s":"lan","lido":false}],"resumo":"Rhya Fleetwood é uma halfling em um mundo onde sua espécie é executada por temor à magia. Quando é salva da forca pelo misterioso Comandante Scythe, descobre que uma marca em seu peito a identifica como uma Remanescente — uma das quatro almas destinadas a restaurar o equilíbrio mágico de um reino moribundo. Arrastada através de territórios perigosos, precisa dominar um poder que nunca pediu enquanto resiste à atração pelo homem que a capturou. Bestseller #1 do Sunday Times, a trilogia de romantasia épica que dominou 2025."},{"serie":"Robert Langdon","autor":"Dan Brown","tipo":"serie","genero":"suspense","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"O Código Da Vinci (#1)","s":"falta","lido":false},{"t":"Anjos e Demônios (#2)","s":"falta","lido":false},{"t":"O Símbolo Perdido (#3)","s":"falta","lido":false},{"t":"Inferno (#4)","s":"tem","lido":false},{"t":"Origem (#5)","s":"tem","lido":false}],"resumo":"O professor de simbologia Robert Langdon é arrastado para conspirações globais envolvendo arte, religião, ciência e sociedades secretas. Cada livro o coloca no centro de uma corrida contra o tempo para decifrar pistas históricas. Dan Brown criou um dos personagens mais reconhecíveis do thriller moderno. Você possui os volumes 4 e 5 — Inferno e Origem — sem os três primeiros da série."},{"serie":"Art Mages of Lure","autor":"Jordan Rivet","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"Curse Painter (#1)","s":"tem","lido":false},{"t":"Próximos volumes (a anunciar)","s":"lan","lido":false}],"resumo":"Em um mundo onde artistas infundem magia em suas obras, uma pintora cujos quadros têm consequências perigosas demais para serem expostos é recrutada para uma missão que exige usar seus talentos proibidos. Jordan Rivet constrói um sistema de magia visual original e inventivo em um universo de intrigas artísticas. Primeiro volume de uma série de fantasia ainda em andamento."},{"serie":"Willa — A Salvação da Floresta","autor":"Robert Beatty","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Willa — A Salvação da Floresta","s":"tem","lido":false}],"resumo":"Willa é uma menina selvagem criada nas montanhas dos Apalaches longe dos humanos. Quando sua floresta é ameaçada por forças industriais, ela precisa aprender a navegar entre dois mundos para proteger o que ama. Robert Beatty cria uma aventura de natureza com fantasia leve e uma protagonista corajosa e feroz. Um romance de formação sobre pertencimento, proteção da terra e identidade."},{"serie":"Rouge","autor":"Mona Awad","tipo":"unico","genero":"suspense","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Rouge","s":"tem","lido":false}],"resumo":"Mona é uma mulher obcecada por cosméticos de luxo que descobre um spa misterioso onde os tratamentos vão além do humano. À medida que mergulha nesse mundo de beleza sobrenatural, os limites entre vaidade, identidade e horror se dissolvem. Mona Awad constrói um conto de fadas sombrio sobre a pressão estética feminina com humor negro e horror visceral. Um dos romances mais originais e perturbadores dos últimos anos."},{"serie":"O Fabricante de Lágrimas","autor":"Erin Doom","tipo":"unico","genero":"romance","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"O Fabricante de Lágrimas","s":"tem","lido":false}],"resumo":"Nica e Rigel cresceram juntos em um orfanato, ligados por um segredo que nenhum deles entende completamente. Quando o passado começa a se revelar através de um livro de contos de fadas antigo, os dois descobrem que sua história vai muito além do que imaginavam. Erin Doom criou um fenômeno literário italiano com narrativa que mistura conto de fadas, romance e mistério. Delicado, emotivo e com uma reviravolta que muda tudo."},{"serie":"Quando Te Vejo","autor":"Holly Miller","tipo":"unico","genero":"romance","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Quando Te Vejo","s":"tem","lido":false}],"resumo":"Callie e Sam se conhecem por acidente quando trocam os diários errados. Sem saber com quem estão falando, os dois começam uma correspondência honesta sobre amor, perda e os sonhos que ficaram pelo caminho. Holly Miller constrói um romance epistolar contemporâneo com dois protagonistas que se encontram no momento certo. Emotivo e com a química certa entre personagens."},{"serie":"Se Ele Estivesse Comigo","autor":"Laura Nowlin","tipo":"unico","genero":"romance","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Se Ele Estivesse Comigo","s":"tem","lido":false}],"resumo":"Autumn e Finny foram melhores amigos na infância, mas foram afastados pela adolescência e pelas pressões sociais. Anos depois, Autumn começa a questionar tudo o que construiu enquanto sente a ausência do amigo que perdeu. Laura Nowlin escreve um YA emotivo sobre amizade, amor não dito e o peso das escolhas que não fazemos. A narrativa alterna entre passado e presente com sensibilidade."},{"serie":"Entre Fogo e Sangue","autor":"Christopher Buehlman","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Entre Fogo e Sangue","s":"tem","lido":false}],"resumo":"Em 1348, durante a Peste Negra, um cavaleiro desonrado encontra uma jovem órfã sozinha em uma vila normanda devastada. Ela lhe diz que a praga é parte de uma catástrofe maior: anjos caídos sob Lúcifer iniciam uma segunda guerra contra o Céu, e o mundo dos homens virou campo de batalha. Horror medieval grimdark visceral, com carga filosófica sobre fé, redenção e o silêncio de Deus."},{"serie":"Entre a Terra e o Céu","autor":"Rebecca Roanhorse","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"Black Sun (#1)","s":"tem","lido":false},{"t":"Fevered Star (#2)","s":"falta","lido":false},{"t":"Mirrored Heavens (#3)","s":"falta","lido":false}],"resumo":"Na cidade sagrada de Tova, o solstício de inverno coincide com um eclipse solar proibido pelos Sacerdotes do Sol. Xiala, capitã cujo canto pode acalmar mares, transporta Serapio, jovem cego e marcado pelo destino. Fantasia épica inspirada nas civilizações pré-colombianas das Américas, vencedora do Hugo Award de Melhor Série."},{"serie":"Sangue sobre Bright Haven","autor":"M. L. Wang","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Sangue sobre Bright Haven","s":"tem","lido":false}],"resumo":"Sciona torna-se a primeira mulher aceita na Alta Magistratura da Universidade de Magia e Indústria — mas é sabotada e relegada ao laboratório mais desprestigiado, assistida por Thomil, caçador nômade cujo povo foi dizimado. Unidos por aliança improvável, descobrem um segredo ancestral que sustenta todo o sistema mágico da cidade. Fantasia sombria sobre ambição, privilégio e o custo moral do progresso."},{"serie":"A Guerra dos Furacões","autor":"Thea Guanzon","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"A Guerra dos Furacões (#1)","s":"tem","lido":false},{"t":"O Despertar das Monções (#2)","s":"tem","lido":false},{"t":"Livro 3 (não anunciado)","s":"lan","lido":false}],"resumo":"Talasyn e Alaric lutaram em lados opostos — Tecelã de Luz contra Forjador de Sombras. Após a guerra, uma aliança política os obriga a se casar. Juntos, precisam impedir a Escuridão Sem Luar, fenômeno capaz de aniquilar tudo. Fantasia épica inspirada no Sudeste Asiático com magia de luz e sombra e romance enemies-to-lovers intenso."},{"serie":"Avalon University","autor":"Alexis Rune & Jeanette Rose","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"Blood & Betrayals (#1)","s":"tem","lido":false},{"t":"Livro 2 (não publicado)","s":"lan","lido":false}],"resumo":"Summer Tuatha De Daanan ingressa na Avalon University, academia mágica de elite. Planejava passar despercebida — mas um assassino sádico começa a drenar Avalon em sangue e Summer se torna a próxima obsessão. Dark academia romantasy com vampiros, anjos e mistério crescente, para fãs de Zodiac Academy e Os Seis de Atlas."},{"serie":"Warbreaker","autor":"Brandon Sanderson","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Warbreaker — O Sopro dos Deuses","s":"tem","lido":false}],"resumo":"Duas princesas são enviadas a um reino inimigo — uma para cumprir tratado de casamento com o Deus-Rei, outra para resgatá-la. Brandon Sanderson entrega fantasia épica standalone com sistema de magia BioChromatic (usa vida e cor como combustível) e política de cortes divinas. Uma das melhores obras independentes do universo Cosmere."},{"serie":"Tress, a Garota do Mar Esmeralda","autor":"Brandon Sanderson","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Tress, a Garota do Mar Esmeralda","s":"tem","lido":false}],"resumo":"Tress nunca saiu de sua ilha — até que o homem que ama é capturado por uma bruxa e levado para os mares de esporos mortais. Para resgatá-lo, ela enfrenta piratas, maldições e o próprio destino. Conto de fadas de Brandon Sanderson com narrador incomum e humor afiado. Parte do Cosmere, funciona de forma independente."},{"serie":"Circe","autor":"Madeline Miller","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Circe","s":"tem","lido":false}],"resumo":"Circe, filha do deus Helios, descobre ter um poder proibido: a feitiçaria. Banida para uma ilha isolada, aprimora seus poderes enquanto encontra heróis e monstros da mitologia grega — de Dédalo a Odisseu. Madeline Miller reimagina a figura marginalizada da mitologia com voz feminina poderosa. Um dos romances de mitologia literária mais aclamados dos últimos anos."},{"serie":"As Crônicas de Júpiter","autor":"Patrícia Criado","tipo":"serie","genero":"scifi","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Interion (#1)","s":"tem","lido":false},{"t":"Insaad (#2)","s":"tem","lido":false}],"resumo":"Série brasileira de fantasia científica de Patrícia Criado ambientada em um universo intergaláctico com magia e política cósmica. A protagonista navega entre mundos e facções em uma jornada de autoconhecimento e poder."},{"serie":"Chama Eterna","autor":"Penn Cole","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Despertar da Chama Eterna (#1)","s":"tem","lido":false},{"t":"Brilho da Chama Eterna (#2)","s":"tem","lido":false},{"t":"Heat of the Everflame (#3)","s":"tem","lido":false}],"resumo":"Zara é uma jovem com poderes de fogo proibidos tentando sobreviver em uma sociedade que os teme. Penn Cole constrói uma romantasia com sistema de magia elementar, academia de guerreiros e romance enemies-to-lovers. Série completa em 3 volumes."},{"serie":"O Deus e a Raposa","autor":"Sophie Kim","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"O Deus e a Raposa","s":"tem","lido":false}],"resumo":"Shin Jia herda de sua avó a tarefa de fazer uma oferta a um deus raposa solitário — e acaba presa em um contrato divino. Mundo inspirado na mitologia coreana, Sophie Kim mistura humor, romance e dilemas sobrenaturais com uma protagonista adorável e um deus imprevisível."},{"serie":"A Maldição de Sombra e Gelo","autor":"Catharina Maura","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"A Maldição de Sombra e Gelo","s":"tem","lido":false}],"resumo":"Uma jovem amaldiçoada a nunca ser amada encontra um príncipe poderoso que propõe um acordo impossível. Catharina Maura constrói uma romantasia de magia fria e romance intenso com elementos de enemies-to-lovers e segredos de corte."},{"serie":"O Que o Rio Sabe","autor":"Isabel Ibañez","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"O Que o Rio Sabe (#1)","s":"tem","lido":false},{"t":"Onde a Biblioteca se Esconde (#2)","s":"tem","lido":false}],"resumo":"Inez Olivares viaja à América do Sul após o desaparecimento de seu pai arqueólogo e se vê enredada em segredos da floresta amazônica e de uma sociedade secreta. Isabel Ibañez mistura aventura histórica com romance e mitologia sul-americana. Duologia completa."},{"serie":"A Curandeira de Zalindov","autor":"Lynette Noni","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"A Curandeira de Zalindov (#1)","s":"tem","lido":false},{"t":"Livros seguintes (verificar)","s":"falta","lido":false}],"resumo":"Kiva Meridan é enviada para a pior prisão do reino para salvar sua mãe enferma. Para sobreviver, precisa curar os doentes — mas Zalindov esconde segredos que podem mudar o destino do reino. Lynette Noni constrói fantasia de prisão com revelações de identidade impactantes."},{"serie":"Jovens de Elite","autor":"Marie Lu","tipo":"serie","genero":"scifi","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Jovens de Elite (#1)","s":"tem","lido":false},{"t":"Sociedade da Rosa (#2)","s":"tem","lido":false},{"t":"A Estrela da Meia-Noite (#3)","s":"tem","lido":false}],"resumo":"June e Day — elite militar e criminoso mais procurado — descobrem que seus inimigos são os mesmos em uma República autoritária distópica. Marie Lu constrói uma distopia YA ágil com protagonistas carismáticos e crítica ao sistema de mérito como instrumento de controle. Trilogia completa."},{"serie":"All Souls — Todas as Almas","autor":"Deborah Harkness","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"A Descoberta das Bruxas (#1)","s":"tem","lido":false},{"t":"Sombra da Noite (#2)","s":"tem","lido":false},{"t":"O Livro da Vida (#3)","s":"tem","lido":false},{"t":"O Oráculo do Pássaro Preto (spin-off)","s":"tem","lido":false}],"resumo":"Diana Bishop descobre um manuscrito encantado em Oxford que desperta a atenção de todas as criaturas sobrenaturais. O vampiro Matthew Clairmont entra em sua vida como aliado improvável. Deborah Harkness constrói uma saga de bruxas, vampiros e alquimia que percorre séculos. O quarto volume é spin-off."},{"serie":"This Woven Kingdom","autor":"Tahereh Mafi","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Reino de Intrigas (#1)","s":"tem","lido":false},{"t":"Reino de Traições (#2)","s":"tem","lido":false},{"t":"Reino de Ilusões (#3)","s":"tem","lido":false},{"t":"Reino de Profecias (#4)","s":"tem","lido":false}],"resumo":"Alizeh é uma criada jinn que esconde seus poderes e seu destino real em um mundo onde jinns foram subjugados pelos humanos. Kamran é o príncipe imperial que começa a suspeitar de sua identidade. Tahereh Mafi constrói fantasia épica inspirada na Pérsia com prosa poética e densa. Série completa em 4 volumes."},{"serie":"Danielle L. Jensen — Séries","autor":"Danielle L. Jensen","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"O Herdeiro Inadequado (#1)","s":"tem","lido":false},{"t":"A Rainha Traidora (#2)","s":"tem","lido":false},{"t":"A Ponte Entre Reinos (série #1)","s":"tem","lido":false},{"t":"Um Destino Tatuado em Sangue (#2)","s":"tem","lido":false},{"t":"Uma Maldição Cravada em Osso (#3)","s":"tem","lido":false}],"resumo":"Danielle L. Jensen autora de múltiplas séries de romantasia. O Herdeiro Inadequado e A Rainha Traidora formam duologia; A Ponte Entre Reinos inicia série relacionada com mais dois volumes."},{"serie":"Todos os Caminhos Me Levam até Você","autor":"Mariana Zapata","tipo":"unico","genero":"romance","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Todos os Caminhos Me Levam até Você","s":"tem","lido":false}],"resumo":"Vanessa e Aiden se conhecem por acidente e o que começa como amizade improvável se torna algo muito mais profundo ao longo dos anos. Mariana Zapata escreve romances de slow burn com protagonistas reservados e química construída lentamente. Um dos romances contemporâneos mais amados da autora."},{"serie":"Grimrose Girls","autor":"Laura Pohl","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"As Garotas de Grimrose (#1)","s":"tem","lido":false},{"t":"A Maldição de Grimrose (#2)","s":"tem","lido":false}],"resumo":"Em Grimrose, escola suíça de elite, quatro amigas descobrem que os contos de fadas são reais — e meninas estão morrendo seguindo seus roteiros. Laura Pohl, autora brasileira, mistura terror, feminismo e magia em um YA de dark academia único. Duologia completa."},{"serie":"Five Broken Blades","autor":"Mai Corland","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Cinco Lâminas Partidas (#1)","s":"tem","lido":false},{"t":"Quatro Reinos Corrompidos (#2)","s":"tem","lido":false}],"resumo":"Cinco assassinos são convocados para matar o mesmo rei — cada um por razões diferentes e sem saber dos outros. Mai Corland constrói fantasia épica inspirada na Ásia com perspectivas múltiplas, política implacável e personagens moralmente complexos."},{"serie":"Dreamblood","autor":"N. K. Jemisin","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Lua de Sangue (#1)","s":"tem","lido":false},{"t":"Sombras do Sol (#2)","s":"tem","lido":false}],"resumo":"Em Gujaareh, cidade-estado sagrada, a magia se alimenta dos sonhos dos dormentes. Ehiru é um Coletor — sacerdote que colhe sonhos para curas e mortes misericordiosas. Uma conspiração o força a questionar tudo. N. K. Jemisin constrói fantasia épica de influência egípcia e africana com sistema de magia onírico único. Duologia completa."},{"serie":"Crave a Marca","autor":"Veronica Roth","tipo":"serie","genero":"scifi","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Crave a Marca (#1)","s":"tem","lido":false},{"t":"Destinos Divididos (#2)","s":"tem","lido":false}],"resumo":"Em uma galáxia de nove planetas percorrida pela Corrente, Cyra Noavek e Akos Kereseth têm destinos opostos que o universo insiste em entrelaçar. Ela é filha do tirano de Shotet; ele, prisioneiro dessa família por profecia. Veronica Roth constrói sci-fi com romance enemies-to-lovers e dilemas sobre livre-arbítrio. Duologia completa."},{"serie":"Only a Monster","autor":"Vanessa Len","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Apenas Um Monstro (#1)","s":"tem","lido":false},{"t":"Jamais Um Herói (#2)","s":"tem","lido":false}],"resumo":"Joan é metade monstro e quando descobre o que isso significa é arrastada para um mundo de criaturas sobrenaturais que viajam no tempo. Vanessa Len inverte os tropos de herói e vilão de forma inteligente. Duologia completa com protagonista moralmente ambígua."},{"serie":"These Violent Delights","autor":"Chloe Gong","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Esses Prazeres Violentos (#1)","s":"tem","lido":false},{"t":"Finais Violentos (#2)","s":"tem","lido":false}],"resumo":"Em Xangai de 1926, Juliette Cai e Roma Montagov — ex-amantes e inimigos — cooperam para investigar uma praga que leva à loucura. Chloe Gong reimagina Romeu e Julieta em fantasia histórica com folclore chinês. Um dos romances históricos YA mais inventivos dos últimos anos. Duologia completa."},{"serie":"Graça e Fúria","autor":"Tracy Banghart","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Graça e Fúria (#1)","s":"tem","lido":false},{"t":"Glória e Ruína (#2)","s":"tem","lido":false}],"resumo":"Nomi é escolhida como Grace — concubina do herdeiro do trono — e usa essa posição para alimentar uma revolução em um mundo onde mulheres não têm voz. Tracy Banghart constrói uma distopia com ação política e dois volumes de tensão crescente."},{"serie":"Feiticeira de Ossos","autor":"Kathryn Purdie","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Amanhecer da Feiticeira de Ossos (#1)","s":"tem","lido":false},{"t":"Luar da Feiticeira de Ossos (#2)","s":"tem","lido":false}],"resumo":"Sonya Helder tem o poder de reanimar os mortos — um dom considerado amaldiçoado. Quando o imperador a recruta, ela descobre que a linha entre vida e morte é mais tênue do que qualquer lei. Kathryn Purdie constrói romantasia com romance épico e dilemas morais genuínos. Duologia completa."},{"serie":"NOIVA","autor":"Ali Hazelwood","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"NOIVA","s":"tem","lido":false}],"resumo":"Romance de fantasia de Ali Hazelwood com protagonista inteligente, romance irresistível e humor característico da autora — agora no universo da fantasia com elementos sobrenaturais."},{"serie":"Phantasma","autor":"Kaylie Smith","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Phantasma","s":"tem","lido":false}],"resumo":"Farrow Ballantyne vence uma competição mortal por um desejo — mas o prêmio a prende em um ciclo de jogos sobrenaturais do qual não consegue sair. Kaylie Smith constrói dark romance de fantasia com atmosfera de horror."},{"serie":"A Resistência da Rainha","autor":"Rebecca Ross","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"A Ascensão da Rainha (#1)","s":"tem","lido":false},{"t":"A Resistência da Rainha (#2)","s":"tem","lido":false}],"resumo":"Uma jovem de origem humilde descobre que seu sangue carrega um segredo que pode mudar o equilíbrio de poder entre reinos. Rebecca Ross constrói duologia de fantasia com laços de lealdade e romance desenvolvido com cuidado. Duologia completa."},{"serie":"Everless","autor":"Sara Holland","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Everless (#1)","s":"tem","lido":false},{"t":"Evermore (#2)","s":"tem","lido":false}],"resumo":"Em Sempera, o tempo é a moeda — extraído do sangue e transformado em moedas de hora. Jules Ember vai trabalhar no palácio para salvar o pai e descobre que seu passado está ligado ao destino do reino. Sara Holland constrói fantasia YA com sistema de magia original. Duologia completa."},{"serie":"Of Fire and Stars","autor":"Audrey Coulthurst","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Fogo e Estrelas (#1)","s":"tem","lido":false},{"t":"Gelo e Sombras (#2)","s":"tem","lido":false}],"resumo":"A princesa Dennaleia foi prometida ao príncipe de um reino vizinho — mas se apaixona por Mare, a irmã rebelde do noivo. Audrey Coulthurst mistura fantasia com romance LGBTQ+ em contexto de cavalos, magia proibida e intrigas políticas. Duologia completa."},{"serie":"Laços e Promessas","autor":"Lexi Ryan","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Laços Perversos (#1)","s":"tem","lido":false},{"t":"Promessas Vazias (#2)","s":"tem","lido":false}],"resumo":"Duologia de romantasia de Lexi Ryan com foco em laços mágicos que prendem protagonistas a um destino indesejado. Laços Perversos e Promessas Vazias exploram o conflito entre livre-arbítrio e vínculos sobrenaturais com romance de slow burn intenso."},{"serie":"Um Animal Selvagem","autor":"Joël Dicker","tipo":"unico","genero":"suspense","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Um Animal Selvagem","s":"tem","lido":false}],"resumo":"Um assalto a banco em Genebra expõe as vidas interligadas de um grupo de personagens aparentemente sem conexão. Joël Dicker constrói thriller de múltiplas perspectivas com reviravoltas precisas. O autor de A Verdade sobre o Caso Harry Quebert mostra seu domínio do suspense."},{"serie":"Babel","autor":"R. F. Kuang","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Babel","s":"tem","lido":false}],"resumo":"Oxford, 1836. Robin Swift é treinado como tradutor para o Instituto Babel — onde a magia da prata alimenta o Império Britânico. Quando as contradições do colonialismo se tornam insuportáveis, ele precisa escolher entre lealdade e revolução. R. F. Kuang escreve sobre linguagem, poder e o custo humano do imperialismo."},{"serie":"Pacto de Sangue","autor":"S. T. Gibson","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Pacto de Sangue","s":"tem","lido":false}],"resumo":"Após séculos de exílio, vampiros retornam ao mundo como nobres em declínio. Uma jovem mortal entra em pacto de sangue com um deles para sobreviver. S. T. Gibson constrói romantasia gótica com tensão de classe, política sobrenatural e romance proibido de atmosfera densa."},{"serie":"Gentleman Bastards","autor":"Scott Lynch","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"As Mentiras de Locke Lamora (#1)","s":"tem","lido":false},{"t":"Livros seguintes (sem tradução PT-BR)","s":"lan","lido":false}],"resumo":"Locke Lamora é um ladrão de elite em Camorr, cidade inspirada em Veneza renascentista, que executa golpes elaborados contra os mais ricos. Scott Lynch mistura heist, fantasia épica e humor afiado. Um dos debuts mais aclamados da fantasia moderna. Série em andamento."},{"serie":"As Crônicas de Gelo e Fogo","autor":"George R. R. Martin","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"A Guerra dos Tronos (#1)","s":"tem","lido":false},{"t":"A Fúria dos Reis (#2)","s":"tem","lido":false},{"t":"A Tormenta de Espadas (#3)","s":"tem","lido":false},{"t":"O Festim dos Corvos (#4)","s":"tem","lido":false},{"t":"A Dança dos Dragões (#5)","s":"tem","lido":false},{"t":"The Winds of Winter (#6 — não publicado)","s":"lan","lido":false},{"t":"A Dream of Spring (#7 — não publicado)","s":"lan","lido":false}],"resumo":"Em Westeros, famílias nobres disputam o Trono de Ferro enquanto uma ameaça sobrenatural avança pelo norte. George R. R. Martin redefiniu a fantasia épica com personagens moralmente complexos e narrativa brutal. A série permanece inacabada — os dois últimos volumes ainda não foram publicados."},{"serie":"Fogo e Sangue","autor":"George R. R. Martin","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Fogo e Sangue","s":"tem","lido":false}],"resumo":"A história da Casa Targaryen desde sua chegada a Westeros até a Dança dos Dragões. George R. R. Martin escreve no estilo de crônica histórica narrada por um maestre, com batalhas épicas, dragões e intrigas medievais. Lore essencial para fãs do universo."},{"serie":"The War of Lost Hearts","autor":"Carissa Broadbent","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Daughter of No Worlds (#1)","s":"tem","lido":false},{"t":"Children of Fallen Gods (#2)","s":"tem","lido":false},{"t":"Mother of Death & Dawn (#3)","s":"tem","lido":false},{"t":"Ashen Son (novela companion)","s":"tem","lido":false}],"resumo":"Tisaanah é uma escrava com poderes raros que faz pacto com Maxantarius, o mago mais poderoso e temido da era. Carissa Broadbent constrói trilogia de fantasia épica com romance lento e intenso. A autora de Coroas de Nyaxia mostra o mesmo domínio de personagens complexos. Trilogia completa."},{"serie":"Ala D","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Ala D","s":"tem","lido":false}],"resumo":"Uma mulher é internada em uma ala psiquiátrica contra sua vontade e questiona se está perdendo a sanidade — ou se alguém quer que ela acredite nisso. Freida McFadden usa o ambiente hospitalar para criar thriller claustrofóbico sobre manipulação e gaslighting institucional."},{"serie":"O Castelo Animado","autor":"Diana Wynne Jones","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"O Castelo Animado (#1)","s":"tem","lido":false},{"t":"Castle in the Air (#2)","s":"falta","lido":false},{"t":"House of Many Ways (#3)","s":"falta","lido":false}],"resumo":"Sophie é amaldiçoada pela Bruxa do Deserto e transformada em uma velha de 90 anos. Para quebrar a maldição, refugia-se no Castelo Ambulante de Howl, feiticeiro jovem, vaidoso e misterioso. Diana Wynne Jones criou um dos romances de fantasia mais amados e inventivos da literatura. Clássico absoluto."},{"serie":"Born of Blood and Ash","autor":"Jennifer L. Armentrout","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"Born of Blood and Ash (#1)","s":"tem","lido":false},{"t":"Primal of Blood and Bone (#2)","s":"tem","lido":false},{"t":"Volumes seguintes (aguardam publicação)","s":"lan","lido":false}],"resumo":"Nova série de Jennifer L. Armentrout no mesmo universo de Sangue e Cinzas, focada em novos personagens e conflitos. Born of Blood and Ash e Primal of Blood and Bone são os dois primeiros volumes. Série em andamento."},{"serie":"Estilhaça-me","autor":"Tahereh Mafi","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Estilhaça-me (#1)","s":"tem","lido":false},{"t":"Liberta-me (#2)","s":"tem","lido":false},{"t":"Ignita-me (#3 — Desafia-me)","s":"tem","lido":false},{"t":"Restaura-me (#4)","s":"tem","lido":false},{"t":"Recorda-me (#5 — Incendeia-me)","s":"tem","lido":false},{"t":"Imagina-me (#6)","s":"tem","lido":false}],"resumo":"Juliette Ferrars tem um toque que pode matar — desde criança foi mantida isolada por ser considerada uma arma. Quando o Reestablishment a recruta para uso militar, ela conhece Aaron Warner, comandante frio e misterioso, e Adam, o único que resiste ao seu poder. Tahereh Mafi constrói uma distopia YA com prosa poética e intensa, focada em identidade, abuso de poder e amor. Série completa em 6 volumes."},{"serie":"O Golem e o Gênio","autor":"Helene Wecker","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"O Golem e o Gênio","s":"tem","lido":false}],"resumo":"Em 1899, Nova York. Chava é um golem de argila criado para servir — seu mestre morre na travessia do Atlântico e ela chega livre e sem propósito. Ahmad é um gênio do cobre, acidentalmente libertado após séculos de aprisionamento. Os dois se encontram no Lower East Side e formam uma amizade improvável entre seres sobrenaturais tentando existir no mundo humano. Helene Wecker mistura folclore judaico e árabe com ficção histórica de Nova York."},{"serie":"Ascensão dos Lobos","autor":"Sable Sorensen","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"A Ascensão dos Lobos (#1)","s":"tem","lido":false},{"t":"Fury Bound (#2)","s":"tem","lido":false}],"resumo":"Série de romantasia de Sable Sorensen ambientada em um mundo de fae e lobisomens com política de alcateia e romance intenso. A Ascensão dos Lobos é o primeiro volume; Fury Bound o segundo. Ambos adquiridos em PT-BR."},{"serie":"Samantha Shannon — Mundo do Priorado","autor":"Samantha Shannon","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"O Priorado da Laranjeira","s":"tem","lido":false},{"t":"Um Dia de Céu Noturno (novela companion)","s":"tem","lido":false}],"resumo":"O Priorado da Laranjeira é uma fantasia épica standalone ambientada em um mundo matriarcal com dragões e uma guerra milenar entre Oriente e Ocidente. Um Dia de Céu Noturno é uma novela companion set no mesmo universo. Samantha Shannon cria um worldbuilding denso com protagonistas femininas complexas e política de dragões magistral."},{"serie":"Sete Espinhos Mortais","autor":"Amber Hamilton","tipo":"unico","genero":"fantasia","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Sete Espinhos Mortais","s":"tem","lido":false}],"resumo":"Uma jovem é convocada para um torneio mortal entre sete candidatos — cada um representando um dos pecados capitais. Para sobreviver, ela precisa usar inteligência, magia e alianças perigosas num ambiente de dark academia sobrenatural. Amber Hamilton constrói uma romantasia com atmosfera densa e competição letal."},{"serie":"Ciclo da Herança","autor":"Christopher Paolini","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"Eragon (#1)","s":"tem","lido":false},{"t":"Eldest (#2)","s":"tem","lido":false},{"t":"Brisingr (#3)","s":"tem","lido":false},{"t":"Herança (#4)","s":"tem","lido":false}],"resumo":"Eragon, um jovem fazendeiro, encontra uma pedra que resulta ser um ovo de dragão. Ao nascer, a dragoa Saphira o transforma em Cavaleiro de Dragão — última esperança contra o rei tirano Galbatorix. Christopher Paolini escreveu o primeiro volume aos 15 anos e construiu um dos universos de fantasia épica YA mais amados da última geração. Série completa em 4 volumes."},{"serie":"The Book of Azrael","autor":"Amber V. Nicole","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"The Book of Azrael (#1)","s":"tem","lido":false},{"t":"The Throne of Broken Gods (#2)","s":"tem","lido":false},{"t":"The Dawn of the Cursed Queen (#3)","s":"tem","lido":false},{"t":"Volumes seguintes (aguardam publicação)","s":"lan","lido":false}],"resumo":"Em um mundo onde deuses e mortais coexistem em guerra fria frágil, Liam é o assassino mais letal do reino dos deuses — e Dianna é uma Caçadora que deveria ser seu inimigo. Amber V. Nicole constrói uma romantasia épica com um sistema de magia divina, romance enemies-to-lovers de alta tensão e um universo expansivo. Série em andamento com 3 volumes publicados."},{"serie":"Harry Potter","autor":"J. K. Rowling","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"completa","seq":[{"t":"A Pedra Filosofal (#1)","s":"tem","lido":false},{"t":"A Câmara dos Segredos (#2)","s":"tem","lido":false},{"t":"O Prisioneiro de Azkaban (#3)","s":"tem","lido":false},{"t":"O Cálice de Fogo (#4)","s":"tem","lido":false},{"t":"A Ordem da Fênix (#5)","s":"tem","lido":false},{"t":"O Príncipe Misterioso (#6)","s":"tem","lido":false},{"t":"Os Talismãs da Morte (#7)","s":"tem","lido":false}],"resumo":"Harry Potter descobre no seu aniversário de 11 anos que é um bruxo — e que é famoso no mundo mágico por ter sobrevivido ao ataque do bruxo mais temível de todos quando bebê. Cada volume acompanha um ano em Hogwarts, escola de magia, enquanto Harry e seus amigos crescem e enfrentam o retorno de Voldemort. J. K. Rowling criou o universo fantástico mais popular da história da literatura contemporânea."},{"serie":"Academia de Vampiros","autor":"Richelle Mead","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"incompleta","seq":[{"t":"Academia de Vampiros (#1)","s":"tem","lido":false},{"t":"Livros seguintes (verificar)","s":"falta","lido":false}],"resumo":"Rose Hathaway é uma dhampir — metade humana, metade vampira — treinada para proteger os Moroi, vampiros vivos com poderes elementais. Quando ela e sua melhor amiga Lissa fogem da academia e são capturadas, Rose descobre que o mundo dos vampiros é mais perigoso e político do que imaginava. Richelle Mead criou um dos universos paranormais YA mais populares dos anos 2000. Série em 6 volumes."},{"serie":"Um Lugar Bem Longe Daqui","autor":"Delia Owens","tipo":"unico","genero":"romance","plano":null,"ordemSug":0,"status":"unico","seq":[{"t":"Um Lugar Bem Longe Daqui","s":"tem","lido":false}],"resumo":"Kya Clark cresceu sozinha nos pântanos da Carolina do Norte depois que a família a abandonou. Tornou-se especialista em biologia local — e suspeita quando um jovem da cidade é encontrado morto. Delia Owens mistura romance, natureza e suspense num romance literário de rara beleza atmosférica. Um dos livros mais vendidos da última década."},{"serie":"Livro da Noite","autor":"Holly Black","tipo":"serie","genero":"fantasia","plano":null,"ordemSug":0,"status":"aguarda","seq":[{"t":"Livro da Noite (Vol. 1)","s":"tem","lido":false},{"t":"Vol. 2 (aguarda lançamento PT-BR)","s":"lan","lido":false}],"resumo":"Charlie Hall é uma vigarista que passou metade da vida trabalhando para sombristas — pessoas com magia para manipular sombras. Ela quer deixar essa vida para trás, mas quando uma figura aterrorizante do passado retorna, é arrastada de volta para um turbilhão de assassinatos e mentiras const CHIP_BASE = "display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:999px;font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;";
function genreColors(g) {

function genreLabel(g) { return ({ fantasia: 'Fantasia', suspense: 'Suspense', romance: 'Romance', scifi: 'Ficção científica' })[g] || 'Outro'; }
function coverGrad(g) { const c = { fantasia: '#3A2247', suspense: '#163038', romance: '#4A2030', scifi: '#1C2E50' }[g] || '#2A251C'; return 'linear-gradient(155deg,' + c + ',#14110E)'; }
function statusMeta(s) {

  return m[s] || m.unico;
}
function planMeta(p) {

function planChipHtml(meta) { return '<span style="' + CHIP_BASE + 'background:' + meta.bg + ';color:' + meta.fg + ';">' + esc(meta.label) + '</span>'; }

}

function initials(name) {
  if (!name) return '?';
  const skip = { de: 1, da: 1, do: 1, das: 1, dos: 1, e: 1, a: 1, o: 1, as: 1, os: 1, the: 1, of: 1 };
  const words = String(name).replace(/[\/—–\-]/g, ' ').split(/\s+/).filter(w => w && !skip[w.toLowerCase()]);
  const ls = words.slice(0, 2).map(w => w[0]).join('');
  return (ls || String(name)[0] || '?').toUpperCase();
}

/* ---- enrich ---- */
function enrich(l) {
  const seq = Array.isArray(l.seq) ? l.seq : [];
  const isDiv = (t) => /^\s*[─—–]/.test(t || '');
  const vols = seq.filter(v => !isDiv(v.t));
  const owned = vols.filter(v => v.s === 'tem');
  const ownedCount = owned.length;
  const lidosCount = owned.filter(v => v.lido).length;
  let leituraClass = 'nao';
  if (ownedCount > 0) leituraClass = lidosCount >= ownedCount ? 'lido' : (lidosCount > 0 ? 'pendente' : 'nao');
  const sMeta = statusMeta(l.status);
  const pMeta = l.plano ? planMeta(l.plano) : null;
  const pct = ownedCount > 0 ? Math.round(lidosCount / ownedCount * 100) : 0;
  const progressLabel = l.tipo === 'unico'
    ? (ownedCount ? (lidosCount ? 'Lido' : 'Não lido') : 'Não adquirido')
    : (ownedCount ? lidosCount + '/' + ownedCount + ' lidos' : 'Nada na estante');
  const seqView = seq.map(v => {
    if (isDiv(v.t)) return { isDivider: true, isVol: false, label: (v.t || '').replace(/[─—–]+/g, '').trim() };
    let kind, label, color;
    if (v.s === 'falta') { kind = 'falta'; label = 'Falta comprar'; color = '#D8A463'; }
    else if (v.s === 'lan') { kind = 'lan'; label = 'Aguarda lançamento'; color = '#6E6557'; }
    else if (v.lido) { kind = 'lido'; label = 'Lido'; color = '#C8A24A'; }
    else { kind = 'tem'; label = 'Na estante'; color = '#948B7A'; }
    return {
      isDivider: false, isVol: true, t: v.t, label, iconColor: color, kind,
      titleStyle: "font-size:13.5px;line-height:1.4;color:" + (kind === 'lido' ? '#6E6557' : '#CBC3B2') +
        ";text-decoration:" + (kind === 'lido' ? 'line-through' : 'none') + ";text-decoration-color:#4A4438;",
    };
  });
  return {
    id: l._id, serie: l.serie, autor: l.autor, tipo: l.tipo, tipoLabel: l.tipo === 'serie' ? 'Série' : 'Livro único',
    genero: l.genero, plano: l.plano, hasPlan: !!l.plano, planMetaObj: pMeta,
    status: l.status, statusMetaObj: sMeta,
    resumo: l.resumo || '', cover: l.cover || '', hasCover: !!l.cover, coverGrad: coverGrad(l.genero),
    coverBtnLabel: l.cover ? 'Trocar capa' : 'Adicionar capa',
    initials: initials(l.serie), ownedCount, lidosCount, pct, progressLabel, leituraClass,
    seqView, ordem: l.ordemSug || 0,
    searchText: (l.serie + ' ' + l.autor + ' ' + genreLabel(l.genero) + ' ' + seq.map(v => v.t).join(' ')).toLowerCase(),
  };
}

function matchFilters(it) {
  const f = state.filters; const s = state.search.trim().toLowerCase();
  if (f.plano !== 'todos' && it.plano !== f.plano) return false;
  if (f.genero !== 'todos' && it.genero !== f.genero) return false;
  if (f.tipo !== 'todos' && it.tipo !== f.tipo) return false;
  if (f.colecao !== 'todos') {
    if (f.colecao === 'incompleta') { if (it.status !== 'incompleta' && it.status !== 'misto') return false; }
    else if (it.status !== f.colecao) return false;
  }
  if (f.leitura !== 'todos' && it.leituraClass !== f.leitura) return false;
  if (s && it.searchText.indexOf(s) === -1) return false;
  return true;
}
function sorter() {
  if (state.sort === 'fila') {
    return (a, b) => {
      const pa = a.hasPlan ? 0 : 1, pb = b.hasPlan ? 0 : 1;
      if (pa !== pb) return pa - pb;
      if (a.hasPlan && b.hasPlan) { const ka = a.ordem > 0 ? a.ordem : 999, kb = b.ordem > 0 ? b.ordem : 999; if (ka !== kb) return ka - kb; }
      return a.serie.localeCompare(b.serie, 'pt-BR');
    };
  }
  return (a, b) => a.serie.localeCompare(b.serie, 'pt-BR');
}
function computeStats() {
  let total = 0, lidos = 0, series = 0, unicos = 0, lendo = 0, falta = 0, lan = 0;
  state.livros.forEach(l => {
    if (l.tipo === 'serie') series++; else unicos++;
    if (l.plano === 'lendo') lendo++;
    (l.seq || []).forEach(v => {
      if (/^\s*[─—–]/.test(v.t || '')) return;
      if (v.s === 'tem') { total++; if (v.lido) lidos++; }
      else if (v.s === 'falta') falta++;
      else if (v.s === 'lan') lan++;
    });
  });
  return { total, lidos, series, unicos, lendo, falta, lan, pct: total ? Math.round(lidos / total * 100) : 0 };
}

/* ---- fila ---- */
function renderFila() {
  const all = state.livros.map(enrich);
  const fila = all.filter(it => it.hasPlan).sort((a, b) => { const ka = a.ordem > 0 ? a.ordem : 999, kb = b.ordem > 0 ? b.ordem : 999; return ka !== kb ? ka - kb : a.serie.localeCompare(b.serie, 'pt-BR'); });

            editField('Série / Título', '<input class="bibl-input" data-act="draftSerie" value="' + attr(d.serie) + '" placeholder="Nome da série ou livro" style="' + INPUT_STYLE + '"/>') +
            editField('Autor(a)', '<input class="bibl-input" data-act="draftAutor" value="' + attr(d.autor) + '" placeholder="Nome do autor(a)" style="' + INPUT_STYLE + '"/>') +
          '</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">' +
          editField('Gênero', '<select data-act="draftGenero" style="' + INPUT_STYLE + 'cursor:pointer;">' + selOpts([['fantasia', 'Fantasia'], ['suspense', 'Suspense / Thriller'], ['romance', 'Romance / Ficção'], ['scifi', 'Ficção científica']], d.genero) + '</select>') +
          editField('Tipo', '<select data-act="draftTipo" style="' + INPUT_STYLE + 'cursor:pointer;">' + selOpts([['serie', 'Série'], ['unico', 'Livro único']], d.tipo) + '</select>') +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">' +
          editField('Coleção', '<select data-act="draftStatus" style="' + INPUT_STYLE + 'cursor:pointer;">' + selOpts([['completa', 'Completa'], ['incompleta', 'Faltam livros'], ['aguarda', 'Aguarda lançamento'], ['misto', 'Mista'], ['unico', 'Livro único']], d.status) + '</select>') +
          editField('Fila', '<select data-act="draftPlano" style="' + INPUT_STYLE + 'cursor:pointer;">' + selOpts([['', 'Sem plano'], ['lendo', 'Lendo agora'], ['proximo', 'Próxima leitura'], ['sugestao', 'Sugestão']], d.plano || '') + '</select>') +
          editField('Ordem na fila', '<input type="number" class="bibl-input2" data-act="draftOrdem" value="' + attr(d.ordemSug) + '" min="0" style="' + INPUT_STYLE.replace("'Hanken Grotesk'", "'Spline Sans Mono'") + '"/>') +
        '</div>' +
        '<div style="margin-bottom:14px;">' +
          '<label style="display:block;font-size:11px;font-weight:700;color:#948B7A;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;">Sinopse</label>' +
          '<textarea class="bibl-input2" data-act="draftResumo" placeholder="Breve descrição da obra…" style="width:100%;min-height:88px;resize:vertical;padding:10px 11px;border:1px solid #322D25;border-radius:8px;font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;line-height:1.6;color:#F2EBDD;background:#13110C;outline:none;">' + esc(d.resumo) + '</textarea>' +
        '</div>' +
        '<div style="margin-bottom:8px;">' +
          '<label style="display:block;font-size:11px;font-weight:700;color:#948B7A;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px;">Volumes</label>' +
          '<div id="bibl-edit-vols" style="display:flex;flex-direction:column;gap:6px;">' + editVolsHtml() + '</div>' +
          '<button data-act="addVol" class="bibl-addvol" style="margin-top:8px;width:100%;padding:8px;border:1.5px dashed #443D31;border-radius:8px;background:transparent;color:#948B7A;font-family:\'Hanken Grotesk\',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;">' + icon('plus', 14) + ' Adicionar volume</button>' +
        '</div>' +
        '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid #2A2620;">' +
          '<button data-act="closeEdit" class="bibl-cancel" style="font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;border-radius:9px;border:1px solid #443D31;cursor:pointer;background:transparent;color:#CBC3B2;">Cancelar</button>' +
          '<button data-act="saveDraft" class="bibl-gold-btn" style="font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:9px;border:1px solid transparent;cursor:pointer;background:linear-gradient(135deg,#E7C766,#B8902E);color:#1A150B;">Salvar série</button>' +
        '</div>' +
      '</div>' +
    '</div></div>';
}
function editField(label, control) {
  return '<div><label style="display:block;font-size:11px;font-weight:700;color:#948B7A;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;">' + label + '</label>' + control + '</div>';
}
function afterEditRender() {
  // autofocus série field when adding new
  if (state.editId === 'new') {
    const i = document.querySelector('[data-act="draftSerie"]');
    if (i) i.focus();
  }
}

/* ============================================================
   Toast
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (toastTimer) clearTimeout(toastTimer);
  el.innerHTML = '<div style="position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#221E17;border:1px solid rgba(200,162,74,0.4);color:#E7C766;padding:11px 22px;border-radius:999px;font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;box-shadow:0 12px 28px rgba(0,0,0,0.5);z-index:2000;animation:biblRise 200ms ease;">' + esc(msg) + '</div>';
  toastTimer = setTimeout(() => { el.innerHTML = ''; }, 2200);
}

/* ============================================================
   Ações / atualizações
   ============================================================ */
function refreshData() { renderStats(); renderFila(); renderResults(); }

function setFilter(k, v) { state.filters = { ...state.filters, [k]: v }; renderControls(); renderResults(); }
function setLayout(v) { state.layout = v; savePrefs({ layout: v, sort: state.sort }); renderControls(); renderResults(); }
function setSort(v) { state.sort = v; savePrefs({ layout: state.layout, sort: v }); renderControls(); renderResults(); }
function toggleEdit() { state.editMode = !state.editMode; renderHdrActions(); renderResults(); }

function openModal(id) { state.modalId = id; state.iaText = ''; state.iaLoading = false; renderOverlays(); }
function closeModal() { state.modalId = null; state.iaText = ''; state.iaLoading = false; renderOverlays(); }

/* ---- IA stub (fallback local) ---- */
function pick(arr, seed) { return arr[Math.floor((seed) * arr.length) % arr.length]; }
function gerarSinopseStub(l) {
  const gName = { fantasia: 'fantasia', suspense: 'suspense', romance: 'romance', scifi: 'ficção científica' }[l.genero] || 'ficção';
  const obra = l.tipo === 'serie' ? 'série' : 'obra';
  const r1 = Math.random(), r2 = Math.random(), r3 = Math.random();
  const aberturas = [
    'Em ' + l.serie + ', ' + l.autor + ' conduz o leitor por uma trama de ' + gName + ' marcada por escolhas difíceis e lealdades postas à prova.',
    l.autor + ' constrói em ' + l.serie + ' um universo de ' + gName + ' onde cada decisão cobra seu preço e nada é o que aparenta.',
    'Há um fôlego cinematográfico em ' + l.serie + ': ' + l.autor + ' costura ' + gName + ' e emoção numa narrativa que não dá trégua.',
  ];
  const meios = [
    'A protagonista descobre que sobreviver exige mais coragem — e mais sacrifício — do que jamais imaginou.',
    'Entre alianças instáveis e segredos antigos, a tensão cresce a cada capítulo rumo a um ponto sem retorno.',
    'O enredo equilibra intimidade e grandiosidade, alternando momentos de respiro com viradas inesperadas.',
  ];
  const fechos = [
    'Uma leitura envolvente, ideal para quem busca atmosfera densa e personagens que ficam na memória.',
    'O resultado é uma ' + obra + ' que recompensa a paciência do leitor com camadas que se revelam aos poucos.',
    'Sem revelar para onde tudo caminha, é uma ' + obra + ' que sabe exatamente quando aprofundar e quando acelerar.',
  ];
  return pick(aberturas, r1) + ' ' + pick(meios, r2) + ' ' + pick(fechos, r3);
}
function gerarIA() {
  const l = state.modalId != null ? findLivro(state.modalId) : null;
  if (!l) return;
  state.iaLoading = true; state.iaText = '';
  renderOverlays();
  setTimeout(() => {
    if (state.modalId !== l._id) return;
    state.iaText = gerarSinopseStub(l).trim();
    state.iaLoading = false;
    renderOverlays();
  }, 850 + Math.floor(Math.random() * 500));
}
function salvarIA() {
  const id = state.modalId; const txt = state.iaText;
  if (id == null || !txt) return;
  state.livros = state.livros.map(x => x._id === id ? { ...x, resumo: txt } : x);
  persist(state.livros);
  state.iaText = '';
  renderOverlays(); refreshData();
  showToast('Sinopse atualizada.');
}

/* ---- edição ---- */
function openEdit(id) {
  const l = findLivro(id); if (!l) return;
  const d = JSON.parse(JSON.stringify(l)); if (!Array.isArray(d.seq)) d.seq = [];
  state.editId = id; state.draft = d; state.modalId = null;
  renderOverlays();
}
function openNew() {
  state.editId = 'new';
  state.draft = { _id: null, serie: '', autor: '', genero: 'fantasia', tipo: 'serie', plano: null, ordemSug: 0, status: 'completa', resumo: '', cover: '', seq: [{ t: '', s: 'tem', lido: false }] };
  renderOverlays();
}
function closeEdit() { state.editId = null; state.draft = null; renderOverlays(); }
function addVol() {
  state.draft.seq = [...(state.draft.seq || []), { t: '', s: 'tem', lido: false }];
  document.getElementById('bibl-edit-vols').innerHTML = editVolsHtml();
  const inputs = document.querySelectorAll('[data-act="volTitle"]');
  if (inputs.length) inputs[inputs.length - 1].focus();
}
function removeVol(i) {
  state.draft.seq = state.draft.seq.filter((_, j) => j !== i);
  document.getElementById('bibl-edit-vols').innerHTML = editVolsHtml();
}
function saveDraft() {
  const d = state.draft; if (!d) return;
  if (!d.serie || !d.serie.trim()) { showToast('Informe o nome da série.'); return; }
  const draft = { ...d, plano: d.plano || null, ordemSug: Number(d.ordemSug) || 0, seq: (d.seq || []).filter(v => (v.t || '').trim()) };
  if (state.editId === 'new') {
    const maxId = state.livros.reduce((m, x) => Math.max(m, x._id || 0), 0);
    draft._id = maxId + 1;
    state.livros = [...state.livros, draft];
  } else {
    const eid = state.editId;
    state.livros = state.livros.map(x => x._id === eid ? { ...draft, _id: eid } : x);
  }
  persist(state.livros);
  state.editId = null; state.draft = null;
  renderOverlays(); refreshData();
  showToast('Série salva.');
}
function deleteSerie(id) {
  const l = findLivro(id);
  if (!window.confirm('Remover "' + (l ? l.serie : '') + '" da biblioteca?')) return;
  state.livros = state.livros.filter(x => x._id !== id);
  persist(state.livros);
  if (state.editId === id) { state.editId = null; state.draft = null; }
  if (state.modalId === id) state.modalId = null;
  renderOverlays(); refreshData();
  showToast('Série removida.');
}
function onCoverChange(id, e) {
  const file = e.target.files && e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.livros = state.livros.map(x => x._id === id ? { ...x, cover: reader.result } : x);
    persist(state.livros);
    renderOverlays(); refreshData();
    showToast('Capa atualizada.');
  };
  reader.readAsDataURL(file); e.target.value = '';
}
function onDraftCoverChange(e) {
  const f = e.target.files && e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { state.draft.cover = r.result; document.getElementById('bibl-draft-cover').innerHTML = draftCoverHtml(); };
  r.readAsDataURL(f); e.target.value = '';
}

/* ============================================================
   Delegação de eventos
   ============================================================ */
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.getAttribute('data-act');
  const id = t.hasAttribute('data-id') ? Number(t.getAttribute('data-id')) : null;
  switch (act) {
    case 'open': openModal(id); break;
    case 'edit': openEdit(id); break;
    case 'del': deleteSerie(id); break;
    case 'openNew': openNew(); break;
    case 'toggleEdit': toggleEdit(); break;
    case 'setView': setLayout(t.getAttribute('data-view')); break;
    case 'setSort': setSort(t.getAttribute('data-sort')); break;
    case 'setFilter': setFilter(t.getAttribute('data-key'), t.getAttribute('data-val')); break;
    case 'closeModal': closeModal(); break;
    case 'closeEdit': closeEdit(); break;
    case 'gerarIA': gerarIA(); break;
    case 'salvarIA': salvarIA(); break;
    case 'addVol': addVol(); break;
    case 'removeVol': removeVol(Number(t.getAttribute('data-vol'))); break;
    case 'saveDraft': saveDraft(); break;
    case 'stop': default: break;
  }
});

document.addEventListener('input', (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.getAttribute('data-act');
  switch (act) {
    case 'search': state.search = t.value; renderResults(); break;
    case 'draftSerie':
      state.draft.serie = t.value;
      { const ini = document.getElementById('bibl-draft-initials'); if (ini) ini.textContent = initials(t.value || ''); }
      break;
    case 'draftAutor': state.draft.autor = t.value; break;
    case 'draftResumo': state.draft.resumo = t.value; break;
    case 'draftOrdem': state.draft.ordemSug = t.value; break;
    case 'volTitle': state.draft.seq[Number(t.getAttribute('data-vol'))].t = t.value; break;
    default: break;
  }
});

document.addEventListener('change', (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.getAttribute('data-act');
  const vol = t.hasAttribute('data-vol') ? Number(t.getAttribute('data-vol')) : null;
  switch (act) {
    case 'draftGenero': state.draft.genero = t.value; break;
    case 'draftTipo': state.draft.tipo = t.value; break;
    case 'draftStatus': state.draft.status = t.value; break;
    case 'draftPlano': state.draft.plano = t.value || null; break;
    case 'volStatus': state.draft.seq[vol].s = t.value; break;
    case 'volLido': state.draft.seq[vol].lido = t.checked; break;
    case 'cover': onCoverChange(Number(t.getAttribute('data-id')), e); break;
    case 'draftCover': onDraftCoverChange(e); break;
    default: break;
  }
});

// keyboard: Esc fecha modais
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.editId != null) closeEdit();
    else if (state.modalId != null) closeModal();
  }
});

/* ============================================================
   Boot
   ============================================================ */
mount();
renderHdrActions();
renderStats();
renderControls();
renderFila();
renderResults();
renderOverlays();
</script>
</body>
</html>
