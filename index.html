  .bibl-list-card:hover{box-shadow:0 8px 22px rgba(0,0,0,0.55)!important;background:#221E17!important;border-color:rgba(200,162,74,0.35)!important;}

  .bibl-search:focus{border-color:#C8A24A!important;box-shadow:0 0 0 3px rgba(200,162,74,0.2)!important;}

const LIVROS_DEFAULT = [{"serie":"ACOTAR","autor":"Sarah J. Maas","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Corte de Espinhos e Rosas","s":"tem","lido":true},{"t":"Corte de Névoa e Fúria","s":"tem","lido":true},{"t":"Corte de Asas e Ruína","s":"tem","lido":true},{"t":"Corte de Chamas Prateadas","s":"tem","lido":true},{"t":"Corte de Gelo e Estrelas (novela)","s":"tem","lido":true},{"t":"Livro 5 (possível — sem data)","s":"lan","lido":false}],"resumo":"Feyre é uma caçadora humana que mata um lobo na floresta sem saber que era um faerie. Capturada e levada para a Terra das Fadas, ela descobre um mundo de intrigas, magia e perigo. Para sobreviver, precisa enfrentar uma corte repleta de segredos sombrios — e um deus antigo que ameaça destruir tudo. A relação entre humanos e fadas, permeada de atração e desconfiança, é o coração da série."},{"serie":"Academia Arcana","autor":"Elise Kova","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Academia Arcana","s":"tem","lido":false}],"resumo":"Uma jovem descobre que foi aceita em uma academia de magia de elite, onde a concorrência é implacável e os segredos são mortais. Elise Kova constrói um romance de academia com sistema de magia baseado em elementos e uma protagonista determinada a provar seu valor. O romance com um instrutor proibido adiciona tensão constante à narrativa. Ideal para fãs de academias de magia com protagonistas resilientes."},{"serie":"Akata","autor":"Nnedi Okorafor","tipo":"serie","genero":"fantasia","plano":null,"status":"incompleta","seq":[{"t":"Bruxa Akata","s":"tem","lido":false},{"t":"Akata Warrior (#2)","s":"falta","lido":false},{"t":"Akata Woman (#3)","s":"falta","lido":false}],"resumo":"Sunny Nwazue é uma menina nigeriana-americana albina que descobre ter poderes ligados ao conhecimento ancestral africano. Junto de um grupo de jovens, ela aprende as artes dos Leopard Folk — praticantes de magia oculta no mundo moderno. O conflito entre a vida comum e um destino sobrenatural é central. A série mistura mitologia africana com aventura e autoconhecimento."},{"serie":"Alchemised","autor":"SenLinYu","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Alchemised","s":"tem","lido":true}],"resumo":"Uma história de romance contemporâneo originalmente publicada online que ganhou audiência massiva. Combina dinâmica de amor tardio com personagens complexos e amadurecimento emocional. A escrita é ágil e os diálogos são o ponto forte da narrativa. Ideal para leitores que buscam romance adulto com profundidade emocional genuína."},{"serie":"Anna O","autor":"Matthew Blake","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Anna O","s":"tem","lido":false}],"resumo":"Anna Okonkwo foi encontrada em estado de sonambulismo após o assassinato de dois amigos e nunca mais acordou. Quatro anos depois, um psicólogo tenta descobrir o que ela sabe sobre os crimes. Matthew Blake constrói um thriller médico e psicológico que questiona os limites da consciência. A tensão entre ciência, culpa e memória mantém o leitor em suspense constante."},{"serie":"As Almas da Academia Blackwood","autor":"I. V. Marie","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"As Almas da Academia Blackwood","s":"tem","lido":false}],"resumo":"Uma jovem com poderes sombrios é aceita em uma academia onde estudantes têm habilidades que deveriam ser impossíveis. I. V. Marie cria um ambiente de dark academia com hierarquias perigosas e romance intenso. A protagonista descobre que sobreviver à escola pode ser mais difícil do que enfrentar qualquer ameaça externa. Ideal para fãs de romance com elementos de horror."},{"serie":"As Sete Irmãs","autor":"Lucinda Riley","tipo":"serie","genero":"romance","plano":null,"status":"incompleta","seq":[{"t":"As Sete Irmãs","s":"tem","lido":true},{"t":"A Irmã da Tempestade","s":"tem","lido":true},{"t":"A Irmã da Sombra","s":"tem","lido":true},{"t":"A Irmã da Pérola","s":"tem","lido":true},{"t":"A Irmã da Lua","s":"tem","lido":true},{"t":"A Irmã do Sol","s":"tem","lido":true},{"t":"A Irmã Perdida (#7)","s":"falta","lido":false},{"t":"Atlas — A História de Pa Salt (#8)","s":"falta","lido":false}],"resumo":"Pa Salt, pai adotivo de sete irmãs criadas em um chalé suíço, morre misteriosamente deixando para cada filha uma pista sobre sua origem biológica. Cada livro acompanha uma das irmãs em sua jornada ao passado, por diferentes países e épocas históricas. Lucinda Riley mistura romance com mistério histórico de forma irresistível. A saga familiar é um dos projetos literários mais ambiciosos do romance contemporâneo."},{"serie":"Assistente do Vilão","autor":"Hannah Nicole Maehrer","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":8,"status":"completa","seq":[{"t":"Aprendiz do Vilão","s":"tem","lido":false},{"t":"Assistente do Vilão","s":"tem","lido":false},{"t":"Aliada do Vilão","s":"tem","lido":false}],"resumo":"Evie Sage consegue um emprego improvável: assistente de um vilão declarado que governa com mão de ferro. Enquanto tenta sobreviver ao trabalho mais caótico de sua vida, ela descobre que o 'vilão' é muito mais complexo do que parece. A série mistura fantasia, humor e romance com um protagonismo feminino afiado. O gancho é a química improvável entre a assistente pragmática e seu enigmático chefe."},{"serie":"Até o Último de Nós","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Até o Último de Nós","s":"tem","lido":false}],"resumo":"Duas pessoas que nunca deveriam ter se encontrado ficam presas juntas durante uma tempestade. O que começa como um encontro fortuito se torna uma corrida contra o tempo, com segredos que mudam tudo. McFadden usa o isolamento físico para criar tensão psicológica crescente. O gênero oscila deliberadamente entre romance e suspense."},{"serie":"Avalon","autor":"Marion Zimmer Bradley & Diana L. Paxson","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"As Brumas de Avalon","s":"tem","lido":false},{"t":"A Sacerdotisa de Avalon","s":"tem","lido":false},{"t":"A Casa da Floresta","s":"tem","lido":false},{"t":"Corvos de Avalon","s":"tem","lido":false},{"t":"Ancestrais de Avalon","s":"tem","lido":false},{"t":"A Espada de Avalon","s":"tem","lido":false}],"resumo":"Centrada em Morgaine, meio-irmã do Rei Arthur, a saga reimagina a lenda arturiana sob a perspectiva das sacerdotisas da ilha sagrada de Avalon. Em um mundo onde o paganismo cede espaço ao cristianismo, Morgaine luta para preservar os ritos de sua deusa. Marion Zimmer Bradley constrói uma das maiores releituras feministas da literatura fantástica. Épico, histórico e emocionalmente devastador."},{"serie":"A Ascensão das Estrelas","autor":"Imani Erriu","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Ascensão das Estrelas","s":"tem","lido":false}],"resumo":"Uma jovem com poderes ligados às estrelas é recrutada para uma ordem de guardiões que protege o mundo de ameaças sobrenaturais. Imani Erriu constrói um romance de fantasia com um sistema de magia celestial original e uma protagonista que descobre que seu passado foi construído sobre mentiras. O gancho é a revelação gradual do verdadeiro propósito para o qual ela foi criada."},{"serie":"A Beira da Loucura","autor":"B. A. Paris","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Beira da Loucura","s":"tem","lido":true}],"resumo":"Uma mulher começa a questionar sua própria sanidade após eventos perturbadores em seu novo lar. B.A. Paris constrói um thriller psicológico baseado no isolamento e na manipulação doméstica. O leitor é mantido em dúvida constante sobre o que é real e quem está por trás do terror. A tensão sufocante é a marca registrada da autora."},{"serie":"A Chama de Ember","autor":"Colleen Houck","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Chama de Ember","s":"tem","lido":false}],"resumo":"Dois reinos, dois lados opostos de uma guerra mágica — e uma jovem cujos poderes a colocam no centro do conflito. Colleen Houck usa elementos da mitologia egípcia para construir um romance de fantasia com aventura e sentimentos intensos. A protagonista precisa escolher entre dever e coração em um cenário de poderes antigos e sacrifícios reais. Ideal para fãs de fantasias com mitologia como base."},{"serie":"A Cinco Passos de Você","autor":"Rachael Lippincott","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"A Cinco Passos de Você","s":"tem","lido":false}],"resumo":"Stella e Will são dois adolescentes com fibrose cística que se apaixonam no hospital onde se tratam. As regras de segurança exigem que fiquem a pelo menos cinco passos de distância um do outro. A história é honesta sobre a realidade da doença e o amor impossível entre dois jovens que compartilham o mesmo diagnóstico. Um romance emotivo, tocante e corajoso."},{"serie":"A Contadora","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Contadora","s":"tem","lido":true}],"resumo":"Uma contadora descobre irregularidades financeiras que a colocam no centro de uma conspiração perigosa. Freida McFadden usa a ambiguidade moral de forma eficiente, fazendo o leitor questionar quem são os verdadeiros vilões. O thriller corporativo combina tensão profissional com ameaça pessoal crescente. A revelação final muda a perspectiva sobre todos os personagens."},{"serie":"A Empregada Está de Olho","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Empregada Está de Olho","s":"tem","lido":false}],"resumo":"Uma cuidadora descobre segredos perturbadores sobre a família que a contratou. Freida McFadden usa narradores não confiáveis para criar suspense de reviravolta constante. A tensão entre dependência e poder percorre toda a narrativa. A última página reserva uma surpresa que muda tudo."},{"serie":"A Enfermeira","autor":"Tess Gerritsen","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Enfermeira","s":"tem","lido":false}],"resumo":"Uma enfermeira experiente começa a suspeitar que um colega é responsável por mortes inexplicáveis no hospital. O thriller médico de Tess Gerritsen é preciso e perturbador, usando detalhes técnicos para construir uma narrativa visceral. O dilema ético de acusar um colega sem provas sólidas é o coração do livro. Magistral em seu realismo hospitalar."},{"serie":"A Estranha Sally Diamond","autor":"Liz Nugent","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Estranha Sally Diamond","s":"tem","lido":false}],"resumo":"Sally Diamond foi encontrada adulta na floresta, sem memória e sem identidade. Ao tentar descobrir sua origem, ela tropeça em um passado de horror que envolve um serial killer. Liz Nugent cria uma das protagonistas mais incomuns do thriller: neurodivergente, literal e inesperadamente cativante. A combinação de comédia negra com horror é única."},{"serie":"A Filha do Rei Pirata","autor":"Tricia Levenseller","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Filha do Rei Pirata","s":"tem","lido":false}],"resumo":"Nami, filha de um lendário pirata, precisa infiltrar-se no navio inimigo para salvar seu pai. Disfarçada entre piratas rivais, ela descobre que seu alvo não é o monstro que sempre imaginou. A aventura nos mares mistura ação, romance e dilemas morais de forma ágil. O gancho é a identidade dupla de Nami e o romance proibido que surge no pior momento."},{"serie":"A Filha Perfeita","autor":"Lucinda Berry","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Filha Perfeita","s":"tem","lido":true}],"resumo":"Uma mãe descobre que a filha adotada não é quem ela pensava ser. O thriller de Lucinda Berry explora os limites da maternidade e os segredos que famílias guardam a qualquer custo. A narrativa alterna perspectivas para criar paranoia crescente. O questionamento sobre identidade e amor incondicional é profundamente perturbador."},{"serie":"A Fúria","autor":"Alex Michaelides","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Fúria","s":"tem","lido":false}],"resumo":"Um famoso psicólogo é assassinado em uma ilha grega durante uma reunião de ex-alunos. O narrador, um de seus ex-pacientes, conta a história — mas é confiável? Alex Michaelides usa a estrutura do thriller clássico com um narrador que manipula leitor e personagens simultaneamente. A revelação final redefine tudo o que veio antes."},{"serie":"A Fúria das Chamas","autor":"Olivia Rose Darling","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Fúria das Chamas","s":"tem","lido":false}],"resumo":"Em uma cidade onde vampiros e humanos coexistem em tensão constante, uma jovem com poderes incomuns é arrastada para as guerras das facções sobrenaturais. Olivia Rose Darling constrói uma fantasia urbana com romance intenso e ação bem coreografada. A protagonista descobre que seus poderes a tornam valiosa demais para os dois lados do conflito. O gancho é a corrida para entender sua própria natureza antes que os outros a controlem."},{"serie":"A Garota da Casa ao Lado","autor":"Phoebe Morgan","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Garota da Casa ao Lado","s":"tem","lido":false}],"resumo":"Uma adolescente desaparece em uma comunidade aparentemente segura e os vizinhos percebem que viram sinais mas não agiram. O thriller social de Phoebe Morgan expõe como a indiferença coletiva permite o horror individual. A culpa compartilhada de toda uma vizinhança é o verdadeiro antagonista. Perturbador na sua normalidade."},{"serie":"A Garota no Espelho","autor":"Rose Carlyle","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Garota no Espelho","s":"tem","lido":true}],"resumo":"Duas gêmeas idênticas são separadas ao nascer e criadas em países diferentes. Quando uma delas morre sob circunstâncias suspeitas, a sobrevivente herda a vida da irmã — literalmente. Rose Carlyle constrói um thriller de identidade com tensão impressionante e uma reviravolta final inesquecível. Uma das surpresas mais marcantes da ficção recente."},{"serie":"A Guerra das Papoulas","autor":"R. F. Kuang","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"A Guerra das Papoulas (#1)","s":"tem","lido":true},{"t":"A Deusa em Chamas (#2)","s":"tem","lido":false},{"t":"A República do Dragão (#3)","s":"tem","lido":false}],"resumo":"Em um mundo inspirado na China imperial, Rin é uma órfã que passa no exame mais difícil do Império para estudar na academia de guerra mais prestigiada. Ela descobre que possui poderes de chama ligados a deuses proibidos. Quando a guerra chega, Rin precisa decidir até onde vai para proteger os que ama. A série é conhecida pela brutalidade honesta da guerra e pelo custo real do poder."},{"serie":"A Ilha","autor":"Adrian McKinty","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Ilha","s":"tem","lido":true}],"resumo":"Uma família em férias em uma ilha remota da Austrália tem seu barco roubado e fica presa com um grupo de foragidos perigosos. O thriller de sobrevivência de Adrian McKinty é de tirar o fôlego, com cada decisão tendo consequências imediatas e fatais. A tensão não alivia por uma única página. Um dos thrillers mais intensos dos últimos anos."},{"serie":"A Inquilina","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Inquilina","s":"tem","lido":false}],"resumo":"Uma nova inquilina descobre que a moradora anterior desapareceu misteriosamente. Freida McFadden constrói um thriller de revelações graduais onde cada capítulo adiciona uma camada de suspeita. A linha entre paranoia e intuição nunca fica clara. O final surpreende mesmo leitores experientes do gênero."},{"serie":"A Lenda de Meneka","autor":"Kritika H. Rao","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Lenda de Meneka","s":"tem","lido":false}],"resumo":"Meneka é uma apsara — dançarina celestial — enviada pelos deuses para seduzir e destruir o sábio Kaushika. Mas ao aproximar-se do mortal, ela descobre que nem os deuses são o que parecem. Inspirada na mitologia hindu, a história explora livre-arbítrio, divindade e o que significa ser humano. O gancho é a transformação de uma arma em protagonista de seu próprio destino."},{"serie":"A Linguagem dos Dragões","autor":"S. F. Williamson","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Linguagem dos Dragões","s":"tem","lido":false}],"resumo":"Sora é uma escriba em um mundo onde os dragões se comunicam apenas com humanos escolhidos. Quando ela descobre que possui esse dom, é arrastada para uma intriga política que pode mudar o destino do reino. O sistema de magia baseado em comunicação e interpretação é o grande diferencial da série. A relação entre linguagem e poder é explorada de forma original."},{"serie":"A Mulher do Andar de Cima","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Mulher do Andar de Cima","s":"tem","lido":false}],"resumo":"Uma artista com agorafobia observa os vizinhos pela janela e testemunha algo que não deveria. McFadden constrói um thriller claustrofóbico onde o isolamento da protagonista é tanto sua fraqueza quanto sua única perspectiva. A confiabilidade da narradora é constantemente questionada. Leitura de uma sentada."},{"serie":"A Noite em que Ela Desapareceu","autor":"Lisa Jewell","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Noite em que Ela Desapareceu","s":"tem","lido":false}],"resumo":"Uma jovem desaparece após uma noite em um restaurante e a investigação revela segredos sobre todos ao redor. Lisa Jewell alterna o antes e o depois do desaparecimento com maestria. O culpado óbvio raramente é o verdadeiro responsável nas mãos desta autora. Suspense doméstico no seu melhor."},{"serie":"A Outra Irmã","autor":"Claire Douglas","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Outra Irmã","s":"tem","lido":true}],"resumo":"Duas irmãs têm memórias muito diferentes da mesma infância. Quando o passado ressurge, elas precisam enfrentar o que realmente aconteceu entre elas. Claire Douglas explora como a memória pode ser distorcida pelo trauma familiar. A tensão do vínculo fraternal é usada para criar suspense quase insuportável."},{"serie":"A Paciente Silenciosa","autor":"Alex Michaelides","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Paciente Silenciosa","s":"tem","lido":true}],"resumo":"Alicia Berenson, artista famosa, atirou cinco vezes no marido e nunca mais pronunciou uma palavra. O terapeuta Theo Faber fica obcecado em descobrir por quê. Alex Michaelides criou um dos thrillers mais vendidos da última década. A reviravolta final é genuinamente surpreendente mesmo para leitores experientes do gênero."},{"serie":"A Primeira Mentira","autor":"Ashley Elston","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Primeira Mentira","s":"tem","lido":true}],"resumo":"Uma família guarda um segredo obscuro que começa a vir à tona quando uma jovem retorna para casa. Ashley Elston constrói um thriller familiar onde lealdades são testadas e verdades enterradas custam vidas. O título é literal: a primeira mentira gera todas as outras. A narrativa em múltiplas perspectivas mantém o mistério até o fim."},{"serie":"A Professora","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Professora","s":"tem","lido":false}],"resumo":"Uma professora universitária começa a suspeitar que um de seus alunos conhece segredos sobre seu passado que ela acreditava enterrados. Freida McFadden usa o ambiente acadêmico para criar dinâmicas de poder invertidas. O thriller psicológico questiona quem realmente tem o controle. A revelação final é tanto surpreendente quanto logicamente satisfatória."},{"serie":"A Rosa Acorrentada","autor":"Julie Soto","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Rosa Acorrentada","s":"tem","lido":false}],"resumo":"Uma jovem é vendida como noiva para uma criatura mágica a fim de saldar uma dívida impagável da família. No castelo encantado, ela descobre que nem seu anfitrião nem a magia são o que parecem. A história reimagina A Bela e a Fera com elementos de fantasia épica e romance sombrio. O gancho é a revelação gradual dos segredos que prendem tanto a protagonista quanto a besta."},{"serie":"A Serpente e o Lobo","autor":"Rebecca Robinson","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Serpente e o Lobo","s":"tem","lido":true}],"resumo":"Em uma terra de mitos nórdicos vivos, uma jovem guerreira descobre que seu passado está ligado a uma batalha entre deuses que ela pensava serem apenas lendas. A mitologia nórdica é retratada com riqueza de detalhes e os personagens carregam a força bruta e a poesia da tradição escandinava. O romance épico entre a protagonista e um ser sobrenatural é intenso e bem construído. Um debut impressionante."},{"serie":"A Sete Chaves","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Sete Chaves","s":"tem","lido":true}],"resumo":"Uma mulher presa em uma casa com sete fechaduras misteriosas precisa descobrir o que aconteceu com a ocupante anterior. Freida McFadden usa o confinamento físico como metáfora para o aprisionamento psicológico. Cada chave aberta revela um segredo mais perturbador que o anterior. Um thriller claustrofóbico e veloz."},{"serie":"A Sociedade do Cansaço","autor":"Byung-Chul Han","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"A Sociedade do Cansaço","s":"tem","lido":false}],"resumo":"Byung-Chul Han analisa como a sociedade contemporânea passou do modelo disciplinar para uma sociedade de desempenho onde o sujeito se autoexplora até o colapso. O esgotamento, a depressão e o burnout são sintomas de um sistema que transformou a liberdade em obrigação. Ensaio filosófico breve mas denso. Essencial para entender a exaustão coletiva do século XXI."},{"serie":"A Última Casa da Rua Needless","autor":"Catriona Ward","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"A Última Casa da Rua Needless","s":"tem","lido":true}],"resumo":"Uma mulher, um gato e um lobo formam um trio improvável em uma casa na floresta. Catriona Ward constrói um thriller de horror que desafia qualquer tentativa de categorização com narradores múltiplos e narrativa fragmentada. A experiência de leitura é deliberadamente perturbadora e única. Um dos romances de suspense mais originais já escritos."},{"serie":"A Vida Invisível de Addie LaRue","autor":"V. E. Schwab","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"A Vida Invisível de Addie LaRue","s":"tem","lido":false}],"resumo":"Addie LaRue faz um pacto para viver para sempre — mas ninguém jamais vai lembrá-la. Ela passa 300 anos invisível à memória humana até encontrar um jovem que, impossível, se lembra dela. V.E. Schwab explora solidão, identidade e o preço da imortalidade de forma poética. Um romance de fantasia literária de qualidade narrativa excepcional."},{"serie":"O Acidente","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Acidente","s":"tem","lido":false}],"resumo":"Uma médica de emergência é a única testemunha de um acidente de carro que pode não ter sido um acidente. Freida McFadden usa o ponto de vista profissional para criar um thriller onde o que foi visto e o que foi imaginado se misturam perigosamente. A credibilidade da narradora é o eixo de toda a tensão. Revelações graduais mantêm o leitor em alerta constante."},{"serie":"O Alvorecer de Ônix","autor":"Kate Golden","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"O Alvorecer de Ônix","s":"tem","lido":false}],"resumo":"Em uma academia de caçadores de demônios, Wren é forçada a ocultar seus verdadeiros poderes para sobreviver. O comandante que a supervisiona é o último aliado que ela esperaria. Kate Golden constrói um romance de fantasia com academia, sistema de magia dual e um romance de slow burn desenvolvido com ritmo preciso. A revelação sobre a natureza dos poderes da protagonista é o grande gancho."},{"serie":"O Animal Mais Perigoso de Todos","autor":"Gary L. Stewart","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Animal Mais Perigoso de Todos","s":"tem","lido":false}],"resumo":"Gary Stewart acredita ter descoberto que seu pai biológico é um dos serial killers mais procurados da história americana. A narrativa mistura memória pessoal com investigação jornalística e levanta questões sobre hereditariedade do crime. Perturbador e fascinante como não-ficção narrativa. Uma leitura que questiona o que define um monstro."},{"serie":"O Assassinato no Verão de 1999","autor":"Jeneva Rose","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Assassinato no Verão de 1999","s":"tem","lido":true}],"resumo":"Em uma cidade costeira no verão de 1999, uma jovem é encontrada morta. Décadas depois, uma jornalista retorna para descobrir a verdade que a cidade sempre protegeu. Jeneva Rose constrói um thriller de cidade pequena onde todos guardam os mesmos segredos. O contraste entre a aparente inocência do verão e o horror do crime é o elemento central."},{"serie":"O Casal que Mora ao Lado","autor":"Shari Lapena","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Casal que Mora ao Lado","s":"tem","lido":true}],"resumo":"Um casal sai para jantar na casa dos vizinhos deixando o bebê dormindo em casa. Quando retornam, o bebê sumiu. Shari Lapena constrói um thriller em espiral onde nenhum adulto é inocente. As perspectivas alternadas revelam que cada personagem tem algo a esconder — e que a culpa não está onde parece estar."},{"serie":"O Chalé no Fim do Mundo","autor":"Paul Tremblay","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Chalé no Fim do Mundo","s":"tem","lido":false}],"resumo":"Quatro estranhos invadem uma casa isolada exigindo que o casal que ali vive faça uma escolha impossível para salvar a humanidade. Paul Tremblay constrói um horror filosófico sem resposta fácil. A questão central — o que é real? — nunca é completamente resolvida. Angustiante, ambíguo e impossível de esquecer."},{"serie":"O Coletor de Bruxos","autor":"Charissa Weaks","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"O Coletor de Bruxos","s":"tem","lido":false}],"resumo":"Em um mundo onde bruxas são perseguidas e suas memórias vendidas como mercadoria, uma feiticeira poderosa tenta sobreviver em uma cidade que as vê como ameaça. Charissa Weaks constrói uma fantasia urbana com um sistema de magia baseado em memória e identidade. O romance com o homem encarregado de capturá-la é tenso e gradual. Um debut promissor no gênero."},{"serie":"Os Condenados","autor":"Andrew Pyper","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Os Condenados","s":"tem","lido":false}],"resumo":"Dois irmãos são assombrados pelo espírito de um local onde um crime aconteceu décadas atrás. Andrew Pyper mistura terror psicológico com thriller sobrenatural e trauma familiar transgeracional. A memória e o arrependimento são as verdadeiras assombrações. Perturbador e literariamente ambicioso."},{"serie":"O Despertar da Lua Caída","autor":"Sarah A. Parker","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"O Despertar da Lua Caída","s":"tem","lido":false}],"resumo":"Uma jovem sem poderes visíveis em um mundo de fae descobre que sua conexão especial com a lua a torna mais poderosa do que qualquer criatura mágica. Para sobreviver na corte feérica mais perigosa, ela precisa aprender a usar o que sempre considerou uma fraqueza como sua maior força. Sarah A. Parker constrói uma romantasia com atmosfera densa e romance intenso. A jornada do silêncio ao poder é o coração da narrativa."},{"serie":"O Iluminado + Doutor Sono","autor":"Stephen King","tipo":"serie","genero":"suspense","plano":null,"status":"completa","seq":[{"t":"O Iluminado (#1)","s":"tem","lido":false},{"t":"Doutor Sono (#2)","s":"tem","lido":false}],"resumo":"Jack Torrance aceita o emprego de caseiro do hotel Overlook durante o inverno. Isolado com a família, ele começa a perder o contato com a realidade enquanto o hotel o alimenta com seus demônios. King criou um dos estudos de deterioração mental mais aterrorizantes da literatura. A sequência, Doutor Sono, acompanha o filho Danny décadas depois — com os mesmos poderes e novos perseguidores."},{"serie":"O Massacre da Família Hope","autor":"Riley Sager","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Massacre da Família Hope","s":"tem","lido":true}],"resumo":"Uma família americana é assassinada em sua casa e o caso permanece sem solução por décadas. Riley Sager usa a obsessão por true crime como elemento narrativo, questionando a linha entre crime real e ficção. A protagonista está perigosamente obcecada com o caso. O metanarrative sobre a cultura de true crime é o diferencial do livro."},{"serie":"O Silêncio dos Inocentes","autor":"Thomas Harris","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Silêncio dos Inocentes","s":"tem","lido":false}],"resumo":"O agente do FBI Clarice Starling é enviada para entrevistar o psiquiatra e canibal Hannibal Lecter para traçar o perfil de um serial killer ativo. A relação entre Clarice e Lecter é um dos pares mais fascinantes da literatura de suspense. Thomas Harris redefiniu o gênero do thriller psicológico. O equilíbrio entre inteligência e horror visceral continua incomparável."},{"serie":"O Último Jantar","autor":"Shari Lapena","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"O Último Jantar","s":"tem","lido":true}],"resumo":"Seis casais se encontram para um jantar — e um deles carrega um segredo que pode destruir a todos os outros. Shari Lapena usa o ambiente social tenso para revelar que relacionamentos perfeitos escondem horrores. O thriller doméstico destrói a ilusão de que conhecemos as pessoas com quem convivemos. A reviravolta final é genuinamente chocante."},{"serie":"Beasts of the Briar","autor":"Elizabeth Helen","tipo":"serie","genero":"fantasia","plano":null,"status":"aguarda","seq":[{"t":"Entre Pétalas e Espinhos","s":"tem","lido":false},{"t":"Livros seguintes (sem data)","s":"lan","lido":false}],"resumo":"Em uma terra de magia antiga e criaturas perigosas, uma jovem jardineira descobre que as plantas que cultiva têm memórias das criaturas que as tocaram. Quando um fae misterioso aparece pedindo sua ajuda, ela é arrastada para um mundo que não devia conhecer. Elizabeth Helen constrói uma romantasia com uma atmosfera rica e um romance de slow burn delicioso. O sistema de magia botânico é encantador e original."},{"serie":"Boneco de Neve","autor":"Jo Nesbo","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Boneco de Neve","s":"tem","lido":false}],"resumo":"O detetive Harry Hole recebe uma carta de um serial killer que assina como 'Boneco de Neve'. As vítimas são mulheres que desaparecem sempre que a primeira neve do ano cai em Oslo. Jo Nesbo cria um dos detetives mais fascinantes da literatura nórdica. A atmosfera norueguesa e a psicologia complexa do protagonista são tão importantes quanto o caso em si."},{"serie":"Caraval","autor":"Stephanie Garber","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Caraval","s":"tem","lido":true},{"t":"Legendário","s":"tem","lido":true},{"t":"Finale","s":"tem","lido":true}],"resumo":"Scarlett sonha em participar do Caraval, um espetáculo mágico itinerante onde tudo pode ser real — ou não. Quando finalmente chega, sua irmã desaparece como parte do jogo. Para resgatá-la, Scarlett deve navegar por um labirinto de ilusões, traições e pistas enigmáticas. O limite entre realidade e fantasia nunca fica claro — e essa ambiguidade é o grande trunfo da série."},{"serie":"Canção de Ninar","autor":"Leïla Slimani","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Canção de Ninar","s":"tem","lido":false}],"resumo":"Em Paris, uma babá francesa cuida de um bebê que morre misteriosamente enquanto está sob seus cuidados. Leïla Slimani não esconde o crime — ele é dado na primeira linha. A narrativa é uma análise perturbadora da maternidade, classe social e o que acontece quando o privado e o público colidem. Vencedor do Prix Goncourt, perturbador na sua frieza clínica."},{"serie":"Conto de Fadas","autor":"Stephen King","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Conto de Fadas","s":"tem","lido":false}],"resumo":"Charlie Reade salva a vida de um homem misterioso e, em gratidão, herda uma casa, um cachorro e um portal para um mundo subterrâneo em colapso. No outro lado, ele encontra um reino dominado por uma criatura sombria. King usa os elementos dos contos de fadas clássicos com sua marca inconfundível de horror e emoção. Uma homenagem ao fantástico que é também uma obra profundamente pessoal."},{"serie":"Covenant","autor":"Jennifer L. Armentrout","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":9,"status":"completa","seq":[{"t":"Meio-Sangue","s":"tem","lido":false},{"t":"Puros","s":"tem","lido":false},{"t":"Divindade","s":"tem","lido":false},{"t":"Apôlion","s":"tem","lido":false},{"t":"A Sentinela (#5)","s":"tem","lido":false}],"resumo":"Alexandria Andros é uma half-blood — metade humana, metade deusa grega — treinando para lutar contra daemons em um mundo paralelo ao nosso. Ela carrega um segredo que pode destruir o equilíbrio entre puros e meio-sangues. Entre aulas de combate e revelações sobre sua origem, Alex descobre que sua maior ameaça está mais perto do que imagina. A série mistura mitologia grega com ação e romance intenso."},{"serie":"Crescent City","autor":"Sarah J. Maas","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Casa de Terra e Sangue","s":"tem","lido":true},{"t":"Casa de Céu e Sopro","s":"tem","lido":true},{"t":"Casa de Chama e Sombra","s":"tem","lido":true}],"resumo":"Bryce Quinlan é uma meio-fae que vive em Lunathion, a capital de um mundo urbano onde humanos, fae, vampiros e anjos coexistem. Quando sua melhor amiga é assassinada, Bryce entra em uma investigação que abala as fundações do poder da cidade. A parceria com o agente Hunt Athalar, um anjo caído, é o coração da série. Sarah J. Maas expande seu universo com um ritmo mais adulto e sombrio."},{"serie":"Coroas de Nyaxia","autor":"Carissa Broadbent","tipo":"serie","genero":"fantasia","plano":"proximo","ordemSug":3,"status":"aguarda","seq":[{"t":"── Duologia 1: Nascidos da Noite ──","s":"tem","lido":false},{"t":"1. A Serpente e as Asas Feitas de Vidro","s":"tem","lido":true},{"t":"2. As Cinzas e o Rei Maldito pelas Estrelas","s":"tem","lido":true},{"t":"Extra: Coletânea 1.5 (Six Scorched Roses)","s":"tem","lido":false},{"t":"── Duologia 2: Nascidos da Sombra ──","s":"tem","lido":false},{"t":"3. A Ave e o Coração de Pedra","s":"tem","lido":true},{"t":"4. The Fallen and the Kiss of Dusk","s":"tem","lido":false},{"t":"── Duologia 3: Nascidos do Sangue ──","s":"lan","lido":false},{"t":"5. The Lion and the Deathless Dark (ago/2026)","s":"lan","lido":false},{"t":"6. Livro 6 (sem título confirmado)","s":"lan","lido":false}],"resumo":"Em um universo de vampiros, deuses e magia sombria, a série é dividida em três duologias. Na 1ª, Oraya — humana criada pelo Rei Vampiro — compete em torneio mortal. Na 2ª, Mische, transformada em vampira à força, embarca numa missão ao submundo com o príncipe Asar. Na 3ª duologia, ainda em publicação, uma nova protagonista enfrenta os próprios deuses. Carissa Broadbent é bestseller #1 do New York Times — cada duologia foca um casal diferente no mesmo universo rico."},{"serie":"Crônica do Matador do Rei","autor":"Patrick Rothfuss","tipo":"serie","genero":"fantasia","plano":null,"status":"aguarda","seq":[{"t":"O Nome do Vento","s":"tem","lido":true},{"t":"O Temor do Sábio","s":"tem","lido":true},{"t":"A Música do Silêncio (novela)","s":"tem","lido":false},{"t":"O Estreito Caminho (novela)","s":"tem","lido":false},{"t":"The Doors of Stone (#3)","s":"lan","lido":false}],"resumo":"Kvothe narra sua própria lenda em três dias — como se tornou o maior mágico, músico e ladrão de seu tempo. A magia é baseada em sympathy, um sistema racional e elegante de manipulação de energia. Patrick Rothfuss constrói uma narrativa densa, poética e apaixonante. Considerada uma das melhores obras de fantasia épica do século XXI, apesar do terceiro volume ainda esperado."},{"serie":"Crônicas de Nárnia","autor":"C.S. Lewis","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"O Sobrinho do Mago","s":"tem","lido":false},{"t":"O Leão, a Feiticeira e o Guarda-Roupa","s":"tem","lido":false},{"t":"O Cavalo e Seu Menino","s":"tem","lido":false},{"t":"O Príncipe Caspian","s":"tem","lido":false},{"t":"A Viagem do Peregrino da Alvorada","s":"tem","lido":false},{"t":"A Cadeira de Prata","s":"tem","lido":false},{"t":"A Última Batalha","s":"tem","lido":false}],"resumo":"Sete crianças, em diferentes momentos, descobrem portais para Nárnia — um mundo mágico habitado por animais falantes e governado pelo leão Aslan. Cada volume é uma aventura independente conectada por temas de sacrifício, redenção e esperança. C.S. Lewis criou um dos universos fantásticos mais duradouros da literatura. Clássico intemporal que funciona tanto para crianças quanto para adultos."},{"serie":"Crônicas de Spiderwick","autor":"Tony DiTerlizzi","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"O Guia de Campo","s":"tem","lido":false},{"t":"A Pedra da Vidência","s":"tem","lido":false},{"t":"A Fuga do Duende","s":"tem","lido":false},{"t":"A Árvore Ironwood","s":"tem","lido":false},{"t":"A Ira do Muldumal","s":"tem","lido":false}],"resumo":"Os gêmeos Jared e Simon Grace, junto da irmã Mallory, descobrem no sótão da mansão do bisavô um guia secreto sobre o mundo das fadas. Ao abri-lo, atraem a atenção de criaturas do folclore que querem o livro de volta. A série explora o mundo oculto que coexiste com o humano, com duendes, ogros e espíritos antigos. Ideal para fãs de fantasia com base no folclore europeu."},{"serie":"Crônicas Lunares","autor":"Marissa Meyer","tipo":"serie","genero":"scifi","plano":null,"status":"completa","seq":[{"t":"Cinder","s":"tem","lido":false},{"t":"Scarlet","s":"tem","lido":false},{"t":"Cress","s":"tem","lido":false},{"t":"Winter","s":"tem","lido":false},{"t":"Fairest — Levana (extra)","s":"tem","lido":false}],"resumo":"Cinder é uma cyborg mecânica em Nova Pequim de um futuro distante, vivendo sob o domínio de uma manipuladora rainha lunar. Cada livro reinterpreta um conto de fadas clássico — Cinderela, Chapeuzinho Vermelho, Rapunzel e Branca de Neve. Marissa Meyer mistura sci-fi, fantasia e romance em uma narrativa ágil e envolvente. A revelação sobre a verdadeira identidade de Cinder é o gancho do primeiro volume."},{"serie":"Crave","autor":"Tracy Wolff","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Desejo","s":"tem","lido":false},{"t":"Paixão","s":"tem","lido":false},{"t":"Cobiça","s":"tem","lido":false},{"t":"Sedução","s":"tem","lido":false},{"t":"Devoção","s":"tem","lido":false},{"t":"Tentação","s":"tem","lido":false}],"resumo":"Grace acaba de ser transferida para uma escola de elite no Alasca e descobre que seus colegas não são exatamente humanos. Em um ambiente de vampiros, dragões e outras criaturas, ela precisa sobreviver enquanto se apaixona pelo garoto mais perigoso de todos. Tracy Wolff constrói um romance paranormal de academia com intensidade crescente. A série cresce em escala e sombra a cada volume."},{"serie":"Depois das Brasas","autor":"Aly Martinez","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Depois das Brasas","s":"tem","lido":false}],"resumo":"Após uma tragédia que destruiu suas vidas individuais, dois vizinhos que nunca se notaram começam a se aproximar de formas inesperadas. Aly Martinez constrói um romance de segunda chance com personagens carregando perdas reais e cicatrizes visíveis. A emoção é genuína e a progressão do romance é orgânica. Um romance contemporâneo que equilibra leveza e profundidade emocional."},{"serie":"Deixada para Trás","autor":"Charlie Donlea","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Deixada para Trás","s":"tem","lido":false}],"resumo":"Uma mulher declarada morta por engano retorna para descobrir que sua identidade foi completamente apagada — conta bancária zerada, família convencida, documentos destruídos. Charlie Donlea constrói um thriller de identidade onde a protagonista precisa provar que existe. A paranoia de não ser acreditada é o elemento mais perturbador do livro."},{"serie":"Desenhos Ocultos","autor":"Jason Rekulak","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Desenhos Ocultos","s":"tem","lido":false}],"resumo":"Uma jovem encontra um livro ilustrado antigo cujos detalhes correspondem exatamente a uma série de crimes reais. Jason Rekulak mistura thriller visual com mistério narrativo em um formato único onde as ilustrações fazem parte da experiência. Uma história de horror doméstico contada de dentro para fora. Impossível de descrever sem estragar a surpresa."},{"serie":"Divinos Rivais","autor":"Rebecca Ross","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Divinos Rivais","s":"tem","lido":false},{"t":"Promessas Cruéis","s":"tem","lido":false}],"resumo":"Em um mundo inspirado na Europa do início do século XX, dois jornalistas rivais descobrem que os deuses estão em guerra — e que cada um deles tem um papel nesse conflito. Rebecca Ross constrói um romance epistolar de fantasia com uma química magnética entre os protagonistas. A dinâmica competitiva que evolui para amor é executada com elegância. Um dos romances de fantasia mais elogiados dos últimos anos."},{"serie":"Duna","autor":"Frank Herbert","tipo":"serie","genero":"scifi","plano":null,"status":"completa","seq":[{"t":"Duna","s":"tem","lido":false},{"t":"O Messias de Duna","s":"tem","lido":false},{"t":"Os Filhos de Duna","s":"tem","lido":false},{"t":"O Imperador-Deus de Duna","s":"tem","lido":false},{"t":"Os Hereges de Duna","s":"tem","lido":false},{"t":"A Casa do Capítulo","s":"tem","lido":false}],"resumo":"Paul Atreides é enviado com sua família ao planeta desértico Arrakis, único produtor da especiaria mais valiosa do universo. Quando sua casa é traída e destruída, Paul sobrevive entre os Fremen e começa a cumprir uma profecia milenar. Frank Herbert criou o mais importante romance de ficção científica da história, com camadas de política, ecologia e religião. Uma obra que se aprofunda a cada releitura."},{"serie":"Duologia Nikolai","autor":"Leigh Bardugo","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":6,"status":"completa","seq":[{"t":"Trono de Ouro e Cinzas (King of Scars)","s":"tem","lido":false},{"t":"Rule of Wolves","s":"tem","lido":false}],"resumo":"Nikolai Lantsov, o carismático príncipe de Ravka, tenta reconstruir seu reino destruído enquanto carrega um monstro escondido dentro de si. Com aliados improváveis, ele enfrenta ameaças políticas e sobrenaturais. A duologia expande o universo Grisha com foco em personagens adultos e dilemas de liderança. Indicada para quem amou a Trilogia Grisha e quer mergulhar mais fundo em Ravka."},{"serie":"Dynasty of Thieves","autor":"Mary E. Pearson","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":16,"status":"completa","seq":[{"t":"Dança de Ladrões","s":"tem","lido":false},{"t":"Vow of Thieves","s":"tem","lido":false}],"resumo":"Kazi é uma ladrona de elite enviada para investigar um crime em uma cidade distante. Jase é o filho do senhor local, com seus próprios segredos e lealdades. Os dois são forçados a trabalhar juntos em uma missão que coloca suas vidas em risco. Mary E. Pearson mistura romance, política e aventura em um mundo de fantasia bem construído."},{"serie":"E Não Sobrou Nenhum","autor":"Agatha Christie","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"E Não Sobrou Nenhum","s":"tem","lido":false}],"resumo":"Dez estranhos são convidados para uma ilha isolada. Um a um, eles começam a morrer. Sem saída e sem comunicação, o assassino está entre eles. Agatha Christie criou o mystery mais vendido de todos os tempos com este livro. A estrutura é tão perfeita que definiu o gênero do whodunit por décadas."},{"serie":"Elantris","autor":"Brandon Sanderson","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Elantris","s":"tem","lido":false}],"resumo":"Elantris era uma cidade de deuses — seus habitantes possuíam poderes mágicos e vida longa. Então algo falhou, e os deuses se tornaram mortos-vivos disfuncionais. Brandon Sanderson constrói uma fantasia épica standalone com um sistema de magia fascinante e uma reviravolta política no coração da narrativa. Um excelente ponto de entrada para o universo de Sanderson."},{"serie":"Em Asas de Sangue","autor":"Briar Boleyn","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Em Asas de Sangue","s":"tem","lido":false}],"resumo":"Em uma cidade onde os abrigos acolhem refugiados de um mundo sobrenatural em colapso, uma jovem descobre que tem poderes raros que a tornam um alvo. Briar Boleyn constrói uma fantasia urbana com romance intenso e ação constante. A protagonista navega entre mundos enquanto descobre que nem seus aliados são quem dizem ser. O gancho é a revelação sobre sua verdadeira origem."},{"serie":"Empyrean","autor":"Rebecca Yarros","tipo":"serie","genero":"fantasia","plano":null,"status":"aguarda","seq":[{"t":"Quarta Asa","s":"tem","lido":true},{"t":"Chama de Ferro","s":"tem","lido":true},{"t":"Tempestade de Ônix","s":"tem","lido":true},{"t":"Livro 4 (não publicado)","s":"lan","lido":false},{"t":"Livro 5 (não publicado)","s":"lan","lido":false}],"resumo":"Violet Sorrengail foi criada para ser escriba — mas no último momento é forçada a ingressar na academia de cavaleiros de dragão. Frágil demais para os padrões militares, ela precisa sobreviver ao treinamento mais letal do mundo enquanto aprende que os segredos do Império podem custar milhões de vidas. Rebecca Yarros criou um dos maiores fenômenos da romantasia recente. A química com Xaden Riorson é explosiva e o worldbuilding de dragões é original."},{"serie":"Enciclopédia das Fadas","autor":"Heather Fawcett","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Enciclopédia das Fadas","s":"tem","lido":false}],"resumo":"Emmeline Fox trabalha como especialista acadêmica em fadas — catalogando, analisando, nunca crendo que as criaturas que estuda são reais. Quando um fae misterioso aparece pedindo sua ajuda, ela é arrastada para o mundo oculto das cortes feéricas. Heather Fawcett combina humor acadêmico com fantasia feérica e um romance delicioso. O diferencial é a protagonista intelectual em um mundo que desafia todos os seus pressupostos."},{"serie":"Entre Quatro Paredes","autor":"B. A. Paris","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Entre Quatro Paredes","s":"tem","lido":true}],"resumo":"Uma mulher descobre que o marido aparentemente perfeito esconde um segredo monstruoso. B.A. Paris constrói um thriller doméstico sufocante sobre controle, isolamento e sobrevivência. A narrativa alterna entre o presente e o passado para revelar como uma armadilha se fecha lentamente ao redor de uma vítima. Perturbador na sua precisão."},{"serie":"Enigma","autor":"RuNyx","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Enigma","s":"tem","lido":false}],"resumo":"Em uma academia de elite para super-humanos, uma jovem aparentemente sem poderes é aceita como experimento e desenvolve habilidades que ninguém esperava. RuNyx cria um romance de dark academia com sistema de poderes complexo e um slow burn tenso. A protagonista aprende que ser subestimada pode ser sua maior vantagem. Dark academia com romance intenso e atmosfera sombria."},{"serie":"Erika Foster","autor":"Robert Bryndza","tipo":"serie","genero":"suspense","plano":null,"status":"completa","seq":[{"t":"A Garota no Gelo","s":"tem","lido":false},{"t":"Sangue Frio","s":"tem","lido":false},{"t":"O Último Suspiro","s":"tem","lido":false},{"t":"Uma Sombra na Escuridão","s":"tem","lido":false},{"t":"Sob Águas Escuras","s":"tem","lido":false},{"t":"Vingança","s":"tem","lido":false}],"resumo":"A detetive Erika Foster investiga crimes violentos em Londres enquanto enfrenta preconceito institucional e seu próprio passado de trauma. Robert Bryndza cria uma protagonista complexa em thrillers policiais realistas e sombrios. O conflito entre procedimento policial e instinto pessoal é constante. Uma das séries de detetive mais consistentes da literatura policial britânica atual."},{"serie":"Eu Estou Pensando em Acabar com Tudo","autor":"Iain Reid","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Eu Estou Pensando em Acabar com Tudo","s":"tem","lido":false}],"resumo":"Um casal viaja para visitar os pais do namorado em uma fazenda isolada. A narradora pensa em terminar o relacionamento — mas algo mais profundo está acontecendo. Iain Reid constrói um thriller filosófico e perturbador que questiona a própria identidade. A revelação final muda completamente a leitura de tudo que veio antes."},{"serie":"Fae Chronicles — Corte de Mel","autor":"Shannon Mayer & Kelly St. Clare","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Corte de Mel e Cinzas","s":"tem","lido":true},{"t":"Trono de Penas e Ossos","s":"tem","lido":true},{"t":"A Crown of Petals and Ice","s":"tem","lido":true}],"resumo":"Elliot é uma cavaleira Fae que protege o reino da corte de mel enquanto guarda um segredo sobre sua verdadeira identidade. Quando uma ameaça antiga ressurge, ela é forçada a trabalhar com o inimigo mais improvável de todos. Shannon Mayer e Kelly St. Clare constroem um universo feérico rico com romance de enemies-to-lovers intenso. A trilogia tem um ritmo acelerado e conclusão satisfatória."},{"serie":"Fawkes & Baxter","autor":"Daniel Cole","tipo":"serie","genero":"suspense","plano":null,"status":"incompleta","seq":[{"t":"Boneco de Pano","s":"tem","lido":false},{"t":"Marionete","s":"tem","lido":false},{"t":"Livros 3+ (publicados)","s":"falta","lido":false}],"resumo":"A detetive Fawkes e seu parceiro investigam crimes violentos em Londres usando métodos que testam os limites do procedimento policial. Daniel Cole cria thrillers com cenas de crime elaboradas e personagens com cicatrizes emocionais profundas. A parceria improvável entre os dois detetives é o coração da série. O estilo é visceral e cinematográfico."},{"serie":"Folk of the Air — Povo do Ar","autor":"Holly Black","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"O Príncipe Cruel","s":"tem","lido":true},{"t":"O Rei Perverso","s":"tem","lido":true},{"t":"A Rainha do Nada","s":"tem","lido":true},{"t":"O Canto Mais Escuro da Floresta (companion)","s":"tem","lido":false}],"resumo":"Jude é uma humana criada no mundo feérico após a morte de seus pais. Determinada a conquistar um lugar de poder em uma corte que a despreza, ela se envolve em intrigas e conspirações perigosas. Holly Black é mestre em criar mundos feéricos sombrios e moralmente complexos. O príncipe Cardan é um dos personagens mais memoráveis da fantasia YA recente."},{"serie":"Foice (Scythe)","autor":"Neal Shusterman","tipo":"serie","genero":"scifi","plano":null,"status":"completa","seq":[{"t":"O Ceifador","s":"tem","lido":true},{"t":"A Nuvem","s":"tem","lido":true},{"t":"O Tímbre","s":"tem","lido":true}],"resumo":"Em um futuro onde a morte foi conquistada pela ciência, os Ceifadores são os únicos que ainda matam — e devem fazê-lo com método e justiça. Citra e Rowan são escolhidos para aprender a ser Ceifadores, mas apenas um pode receber o título. Neal Shusterman constrói uma distopia filosófica com questionamentos éticos sobre quem controla a morte. Um dos melhores romances de ficção científica YA da última década."},{"serie":"Freydis e o Monstro Alado","autor":"Jenika Snow","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Freydis e o Monstro Alado","s":"tem","lido":false}],"resumo":"Freydis é uma guerreira viking que encontra um dragão ferido que deveria matar — e decide salvar. A aliança improvável entre a guerreira e a criatura mágica os coloca em rota de colisão com forças maiores do que ambos. Jenika Snow constrói um romance de fantasia nórdica com romance intenso e uma protagonista de força genuína. O vínculo entre humano e dragão é o coração da narrativa."},{"serie":"Garotas em Chamas","autor":"C. J. Tudor","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Garotas em Chamas","s":"tem","lido":false}],"resumo":"Um grupo de adolescentes passa um verão em um resort exclusivo — e uma delas não volta viva. C.J. Tudor constrói um thriller de coming-of-age sombrio onde segredos do passado e do presente se entrelaçam. A atmosfera de verão distorcida cria uma tensão única. O livro questiona memória, lealdade e o que adolescentes fazem para sobreviver umas às outras."},{"serie":"Greenwich Park","autor":"Katherine Faulkner","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Greenwich Park","s":"tem","lido":true}],"resumo":"Uma mulher grávida faz amizade com uma estranha no parque local. O que começa como uma conexão improvável se torna uma espiral de segredos e perigo crescente. Katherine Faulkner constrói um thriller psicológico ambientado em um bairro de Londres que parece seguro demais. As múltiplas perspectivas temporais são usadas com maestria. O suspense doméstico no seu melhor."},{"serie":"Identidade Roubada","autor":"Nora Roberts","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Identidade Roubada","s":"tem","lido":false}],"resumo":"Uma mulher descobre que outra pessoa está vivendo sua vida — com seus documentos, sua conta bancária e seu passado apagado. Nora Roberts mistura suspense e romance em um thriller de identidade com protagonistas fortes e investigação crível. A busca por quem é o verdadeiro inimigo mantém o ritmo acelerado. A solução é satisfatória e inesperada."},{"serie":"Intermezzo","autor":"Sally Rooney","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Intermezzo","s":"tem","lido":false}],"resumo":"Após a morte do pai, dois irmãos muito diferentes lidam com o luto de formas opostas — e com relacionamentos que testam seus limites. Sally Rooney usa sua escrita precisa, sem aspas e intimista para criar personagens internamente complexos. A análise do amor adulto é honesta e sem romantização fácil. Um dos romances literários mais importantes de sua geração."},{"serie":"It Ends With Us","autor":"Colleen Hoover","tipo":"serie","genero":"romance","plano":null,"status":"completa","seq":[{"t":"É Assim Que Acaba","s":"tem","lido":true},{"t":"E Assim Que Começa","s":"tem","lido":false}],"resumo":"Lily Bloom muda para Boston para realizar seu sonho e se apaixona por Ryle, um neurocirurgião. Quando padrões do passado se repetem no presente, Lily precisa encontrar a coragem que sempre admirou em outros. Colleen Hoover aborda violência doméstica com sensibilidade e sem respostas fáceis. Um dos romances mais importantes — e mais discutidos — da última década."},{"serie":"Layla","autor":"Colleen Hoover","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Layla","s":"tem","lido":true}],"resumo":"Leeds e Layla estão apaixonados e desfrutam de um início perfeito em um bed & breakfast. Quando algo inexplicável acontece, Leeds começa a questionar os limites entre amor, identidade e paranormal. Colleen Hoover mistura romance contemporâneo com elementos sobrenaturais de forma inesperada. A narrativa emocional supera qualquer lógica sobrenatural."},{"serie":"Lições Sobre Afogamentos","autor":"Ava Reid","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Lições Sobre Afogamentos","s":"tem","lido":false}],"resumo":"Em um mundo dividido em dois reinos em guerra, uma jovem com poderes proibidos é forçada a navegar entre lealdades rivais. Inspirado na mitologia eslavônica, o romance não poupa o leitor das consequências reais da guerra e do poder. Ava Reid é conhecida por sua prosa poética e personagens que pagam preços reais por suas escolhas. Um dos romances de fantasia mais aclamados criticamente dos últimos anos."},{"serie":"Little Thieves","autor":"Margaret Owen","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"A Ladra Amaldiçoada","s":"tem","lido":false},{"t":"A Deusa Impiedosa","s":"tem","lido":false}],"resumo":"Vanja Schmidt, ex-criada das deusas da sorte e da morte, está usando um roubo elaborado para comprar sua liberdade. Quando uma maldição começa a transformá-la em ouro e joias, ela precisa resolver o problema antes de morrer — literalmente. Margaret Owen reimagina o conto da Ganso de Ouro com humor afiado e romance fae. A protagonista anti-heroína que rouba, mente e sobrevive por instinto é irresistível."},{"serie":"Livrai-nos do Mal","autor":"Rose Wilding","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Livrai-nos do Mal","s":"tem","lido":false}],"resumo":"Um grupo de mulheres decide fazer justiça pelas próprias mãos contra um predador que o sistema falhou em punir. Rose Wilding explora os limites morais da vingança coletiva com tensão crescente. O thriller questiona o que significa justiça quando as instituições falham. A solidariedade feminina é retratada de forma complexa e não idealizada."},{"serie":"Lugar Errado, Hora Errada","autor":"Gillian McAllister","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Lugar Errado, Hora Errada","s":"tem","lido":false}],"resumo":"Jen vê seu filho sair à noite e cometer um crime. Quando acorda, é dez anos atrás. Gillian McAllister usa a viagem no tempo para explorar prevenção de crimes e os limites do amor materno. Cada recuo no tempo revela mais sobre o que levou ao crime. Absolutamente impossível de largar."},{"serie":"Magia das Marés","autor":"Pascale Lacelle","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Magia das Marés","s":"tem","lido":false}],"resumo":"Em uma cidade costeira onde as marés escondem segredos antigos, uma jovem descobre que suas memórias não são inteiramente suas. Pascale Lacelle constrói uma fantasia urbana com um sistema de magia aquático e mistérios sobre identidade e passado. A atmosfera de cidade à beira do oceano é evocada com beleza. O gancho é a revelação sobre quem realmente controla as memórias da protagonista."},{"serie":"Magisterium","autor":"Cassandra Clare","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"O Teste de Ferro","s":"tem","lido":true},{"t":"O Teste de Cobre","s":"tem","lido":true},{"t":"O Teste de Bronze","s":"tem","lido":true},{"t":"O Teste de Prata","s":"tem","lido":true},{"t":"O Teste de Ouro","s":"tem","lido":true}],"resumo":"Callum Hunt cresce ouvindo o pai dizer que a escola de magia é perigosa. Quando passa no teste sem querer, é aceito por um dos mestres mais poderosos — e descobre que a magia está mais ligada à morte do que parece. Cassandra Clare e Holly Black criam uma série de academia mágica com ritmo acelerado e um segredo sobre o protagonista que muda tudo. Ideal para fãs de Harry Potter que querem algo mais sombrio."},{"serie":"Mariposa Escarlate","autor":"Kristen Ciccarelli","tipo":"serie","genero":"fantasia","plano":null,"status":"aguarda","seq":[{"t":"Caçador Sem Coração","s":"tem","lido":false},{"t":"Bruxa Rebelde","s":"tem","lido":false},{"t":"Livro 3 (possível — sem confirmação)","s":"lan","lido":false}],"resumo":"Uma bruxa foge de sua própria corte e se esconde em um convento. O caçador de bruxas enviado para capturá-la descobre que o mundo que ele protege está construído sobre mentiras. Kristen Ciccarelli constrói um romance de fantasia com um sistema de magia baseado em sangue e escolhas. O romance proibido entre caçador e caçada tem uma tensão química genuína."},{"serie":"Maxton Hall","autor":"Mona Kasten","tipo":"serie","genero":"romance","plano":null,"status":"completa","seq":[{"t":"1. Maxton Hall — Salve-me","s":"tem","lido":false},{"t":"2. Maxton Hall — Salve-se","s":"tem","lido":false},{"t":"3. Maxton Hall — Salve-nos","s":"tem","lido":false}],"resumo":"Ruby é uma bolsista em uma escola de elite onde James Beaufort reina. Quando ela testemunha algo que não deveria, os dois ficam presos em um acordo incômodo que nenhum quer. Mona Kasten constrói um romance enemies-to-lovers ambientado no universo da aristocracia britânica estudantil. O desenvolvimento lento do romance é o ponto forte da série."},{"serie":"Mistborn Era 1","autor":"Brandon Sanderson","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"O Império Final","s":"tem","lido":true},{"t":"O Poço da Ascensão","s":"tem","lido":true},{"t":"O Herói das Eras","s":"tem","lido":true}],"resumo":"Em um mundo onde as cinzas caem do céu e o Senhor Supremo governa há mil anos, um grupo de ladrões planeja o golpe mais audacioso da história. Vin, uma jovem das ruas com poderes únicos de Alomância — a magia de usar metais —, é recrutada para a missão. Brandon Sanderson é famoso pelo sistema de magia mais bem construído da fantasia moderna. A reviravolta épica redefine toda a narrativa."},{"serie":"Mistborn Era 2 — Wax & Wayne","autor":"Brandon Sanderson","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":15,"status":"incompleta","seq":[{"t":"A Liga da Lei","s":"tem","lido":true},{"t":"As Sombras de Si Mesmo","s":"tem","lido":true},{"t":"Os Braceletes da Perdição","s":"tem","lido":true},{"t":"O Metal Perdido (#4)","s":"falta","lido":false}],"resumo":"Trezentos anos após a Era 1, Wax é um xerife do Velho Oeste chamado de volta à cidade grande para resolver crimes que envolvem magia e política. Com seu parceiro impulsivo Wayne, ele usa a Alomância em um cenário de fantasia steampunk. A Era 2 é mais leve e ágil, com humor e ação bem equilibrados. Perfeita para continuar no universo sem o peso épico da trilogia original."},{"serie":"Modern Faerie Tales","autor":"Holly Black","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Tithe","s":"tem","lido":false},{"t":"Valente","s":"tem","lido":false},{"t":"Reino de Ferro","s":"tem","lido":false}],"resumo":"Kaye cresceu viajando com a banda de rock da mãe, acreditando que as fadas da infância eram ilusão. Ao retornar para Nova Jersey, descobre que o mundo feérico é muito real e que ela tem um papel nele. Holly Black apresenta um mundo fae sombrio, bem diferente da visão romantizada. Um dos sistemas feéricos mais consistentes e ameaçadores da literatura jovem."},{"serie":"Nada a Declarar","autor":"Karen McManus","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Nada a Declarar","s":"tem","lido":false}],"resumo":"Uma família é presa em um cruzeiro quando um dos passageiros é encontrado morto. Karen McManus constrói um thriller de detetive moderno com um elenco de adolescentes em um ambiente fechado. O whodunit é construído com pistas justas e personagens bem definidos. Ideal para fãs de Agatha Christie que querem uma versão contemporânea."},{"serie":"Nada Fica no Passado","autor":"Jennifer Hillier","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Nada Fica no Passado","s":"tem","lido":false}],"resumo":"Uma mulher descobre que seu passado criminal pode destruir a nova vida que construiu. Jennifer Hillier cria um thriller psicológico sobre culpa, redenção e o que acontece quando segredos enterrados voltam à superfície. A protagonista moralmente ambígua é um dos pontos fortes do livro. A tensão entre quem somos e quem fomos nunca resolve de forma simples."},{"serie":"Nocticadia","autor":"Keri Lake","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Nocticadia","s":"tem","lido":false}],"resumo":"Uma estudante é transferida para uma academia sobrenatural onde a escuridão é literal e os professores são as maiores ameaças. Keri Lake constrói um dark romance de academia com horror atmosférico e um romance de slow burn perturbador. A claustrofobia do ambiente é o grande trunfo da narrativa. Para leitores que preferem o lado mais negro do gênero romantasy."},{"serie":"No Meio da Noite","autor":"Riley Sager","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"No Meio da Noite","s":"tem","lido":false}],"resumo":"A camareira de um hotel de luxo descobre que o hóspede do quarto adjacente está sendo mantido preso. Riley Sager constrói um thriller de clausura com toda a sua habilidade em subverter as expectativas do gênero. O ambiente do hotel cria uma atmosfera única e as revelações se acumulam de forma precisa. Uma leitura que não deixa parar."},{"serie":"Não Incomodar","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Não Incomodar","s":"tem","lido":false}],"resumo":"Uma mulher se isola em um chalé remoto para escrever e descobre que não está tão sozinha quanto pensava. Freida McFadden usa o isolamento geográfico para criar paranoia máxima. A pergunta central — quem está caçando quem? — mantém o leitor em desequilíbrio constante. Leitura de uma sentada."},{"serie":"Nunca Mintas","autor":"Freida McFadden","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Nunca Mintas","s":"tem","lido":false}],"resumo":"Uma psicóloga percebe que uma de suas pacientes está mentindo de forma elaborada — mas o que ela esconde pode ser mais perigoso do que qualquer segredo clínico. Freida McFadden explora a ética profissional em situações extremas. O thriller usa a dinâmica terapeuta-paciente para criar cumplicidade e tensão. A reviravolta é surpreendente e logicamente satisfatória."},{"serie":"Nunca Saia Sozinho","autor":"Charlie Donlea","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Nunca Saia Sozinho","s":"tem","lido":false}],"resumo":"Uma mulher desaparece sem rastros após uma noite de jogo. Charlie Donlea constrói uma investigação em camadas que revela verdades sobre uma cidade inteira. O detetive que investiga o caso carrega seus próprios segredos. A narrativa em múltiplas perspectivas temporais é a marca registrada do autor."},{"serie":"Objetos Cortantes","autor":"Gillian Flynn","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Objetos Cortantes","s":"tem","lido":false}],"resumo":"Camille Preaker, repórter com um passado perturbador, retorna à cidade natal para cobrir o assassinato de meninas jovens. Gillian Flynn cria uma protagonista marcada pelo trauma que investiga crimes enquanto é incapaz de escapar do seu próprio. A escrita é visceral e o Sul americano decadente é retratado de forma sombria. O precursor de Garota Exemplar, igualmente perturbador."},{"serie":"Once Upon a Broken Heart","autor":"Stephanie Garber","tipo":"serie","genero":"fantasia","plano":null,"status":"completa","seq":[{"t":"Era Uma Vez Um Coração Partido","s":"tem","lido":false},{"t":"Espetacular (The Ballad of Never After)","s":"tem","lido":false},{"t":"Alquimia dos Segredos","s":"tem","lido":false}],"resumo":"Evangeline Fox faz um pacto com o Príncipe Jacks — o mais perigoso dos Destinos Feéricos — para impedir o casamento do amor de sua vida. Cada favor de Jacks cobra um preço alto demais. Stephanie Garber reimagina contos de fadas com romance intenso e um vilão carismático que rouba a cena. O mundo de Caraval expandido em uma nova direção sombria."},{"serie":"One Dark Window","autor":"Rachel Gillig","tipo":"serie","genero":"fantasia","plano":"proximo","ordemSug":4,"status":"completa","seq":[{"t":"Uma Janela Sombria","s":"tem","lido":true},{"t":"Duas Coroas Retorcidas","s":"tem","lido":true},{"t":"O Cavaleiro e a Mariposa","s":"tem","lido":false}],"resumo":"Elspeth Spindle carrega uma voz sombria em sua mente — um espírito antigo chamado o Corvo — que a ajuda a sobreviver em um mundo onde uma maldição consome a magia. Para quebrar a maldição, ela precisa trabalhar com um grupo perigoso que inclui o capitão da guarda que a persegue. Rachel Gillig constrói um romance de fantasia atmosférico com personagens moralmente complexos. O romance enemies-to-lovers é desenvolvido com paciência e tensão crescente."},{"serie":"Os Princípios Peculiares de Kit Webb","autor":"Cat Sebastian","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Os Princípios Peculiares de Kit Webb","s":"tem","lido":false}],"resumo":"Kit Webb era um famoso salteador de estradas antes de se aposentar. Percy, filho de um duque, o contrata para aprender a roubar — especificamente seu próprio pai. Cat Sebastian constrói um romance histórico LGBTQ+ na Era Georgiana com inteligência, humor e romance genuinamente tocante. Um dos romances históricos mais elogiados dos últimos anos."},{"serie":"Os Sete Maridos de Evelyn Hugo","autor":"Taylor Jenkins Reid","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Os Sete Maridos de Evelyn Hugo","s":"tem","lido":false}],"resumo":"Evelyn Hugo, lendária atriz de Hollywood, escolhe uma jornalista desconhecida para contar sua história verdadeira. Suas sete relações revelam décadas de glamour, segredos e o amor que nunca pôde admitir publicamente. Taylor Jenkins Reid cria um romance histórico sobre identidade, ambição e o preço da fama. A revelação de por que Monique foi escolhida é o gancho final perfeito."},{"serie":"Parceira","autor":"Ali Hazelwood","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Parceira","s":"tem","lido":false}],"resumo":"Os professores universitários Jane e Cal são forçados a participar de um programa de competitividade que os coloca em situações absurdas. Ali Hazelwood mistura romance acadêmico com humor e tensão não resolvida. A protagonista especialista em neurociência é adorável em sua incapacidade social. Leve, engraçado e genuinamente romântico."},{"serie":"Pássaro e Serpente","autor":"Shelby Mahurin","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":11,"status":"completa","seq":[{"t":"Pássaro e Serpente","s":"tem","lido":false},{"t":"Sangue & Mel","s":"tem","lido":false},{"t":"Deuses e Monstros","s":"tem","lido":false}],"resumo":"Lou é uma bruxa que foge de sua própria espécie e se esconde entre humanos. Reid é um caçador de bruxas dedicado. Quando o destino os une de forma improvável, os dois descobrem que suas verdades são mais complicadas do que acreditavam. Shelby Mahurin ambientou a história em um mundo medieval com magia e religião em conflito constante. O romance enemies-to-lovers é carismático e bem executado."},{"serie":"Pedra, Papel, Tesoura","autor":"Inés Garland","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Pedra, Papel, Tesoura","s":"tem","lido":false}],"resumo":"Inés Garland conta uma história de amizade entre dois adolescentes argentinos nos anos 70, durante a ditadura. O romance de formação explora como o amor e a violência política coexistem no cotidiano sem se anular. A linguagem simples e direta amplifica o impacto emocional. Um livro pequeno com um peso imenso."},{"serie":"Pen Pal","autor":"J. T. Geissinger","tipo":"unico","genero":"romance","plano":null,"status":"unico","seq":[{"t":"Pen Pal","s":"tem","lido":true}],"resumo":"Fern, que viveu em isolamento voluntário numa floresta, começa a trocar cartas com um desconhecido. O que começa como uma conexão epistolar inocente se torna algo mais intenso e misterioso. J.T. Geissinger usa o formato de cartas de forma inteligente para criar intimidade e tensão simultaneamente. O romance oscila entre ternura e suspense de forma deliberada."},{"serie":"Ponto Final","autor":"A. J. Finn","tipo":"unico","genero":"suspense","plano":null,"status":"unico","seq":[{"t":"Ponto Final","s":"tem","lido":false}],"resumo":"Uma mulher que vive em reclusão começa a receber mensagens de um stalker. A.J. Finn constrói um thriller que mistura cinefilia, paranoia e questões de saúde mental. A protagonista observa o mundo de dentro para fora — e o leitor questiona constantemente o que ela realmente vê. A reviravolta desafia o que o leitor foi condicionado a acreditar."},{"serie":"Powerless","autor":"Lauren Roberts","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":13,"status":"completa","seq":[{"t":"Powerless (#1)","s":"tem","lido":false},{"t":"Fearless (#2)","s":"tem","lido":false},{"t":"Reckless (#3)","s":"tem","lido":false},{"t":"Powerful (novela companion)","s":"tem","lido":false}],"resumo":"Paedyn é uma garota comum em um mundo de Elites — pessoas com poderes —, sobrevivendo ao fingir ter habilidades que não possui. Quando é forçada a participar dos Jogos, competição mortal entre os mais poderosos, sua farsa chega ao limite máximo. O príncipe que deve eliminá-la pode ser o único que a vê de verdade. Romance YA intenso com forte elemento de enemies-to-lovers e crítica social."},{"serie":"Realm Breaker","autor":"Victoria Aveyard","tipo":"serie","genero":"fantasia","plano":null,"status":"misto","seq":[{"t":"Destruidor de Espadas (#1)","s":"tem","lido":false},{"t":"Blade Breaker (#2)","s":"falta","lido":false},{"t":"War Cross (#3)","s":"lan","lido":false}],"resumo":"Uma antiga ameaça ressurgiu para destruir o véu que separa mundos. Uma jovem guerreira improvável precisa reunir uma equipe de heróis — incluindo um imortal relutante — para impedir o fim de tudo. Victoria Aveyard constrói um mundo de fantasia épica com um elenco diverso e dinâmicas envolventes. O primeiro volume apresenta o universo com ritmo e ambição."},{"serie":"Rebelde do Deserto","autor":"Alwyn Hamilton","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":14,"status":"completa","seq":[{"t":"A Rebelde do Deserto","s":"tem","lido":false},{"t":"A Traidora do Trono","s":"tem","lido":false},{"t":"A Heroína da Alvorada","s":"tem","lido":false},{"t":"Contos de Areia e Mar (extra)","s":"tem","lido":false}],"resumo":"Amani é uma atiradora de elite que sonha em fugir do interior árido e opressivo de seu país. Quando o Príncipe Rebelde entra em sua vida, ela se vê no centro de uma revolução. O mundo é inspirado no Oriente Médio, com djinns, tiranos e magia antiga. O romance entre a garota do povo e o herdeiro da rebelião é o coração da narrativa."},{"serie":"Red Queen","autor":"Victoria Aveyard","tipo":"serie","genero":"fantasia","plano":"sugestao","ordemSug":10,"status":"completa","seq":[{"t":"A Rainha Vermelha","s":"tem","lido":false},{"t":"Espada de Vidro","s":"tem","lido":false},{"t":"A Prisão do Rei","s":"tem","lido":false},{"t":"Tempestade de Guerra","s":"tem","lido":false},{"t":"Trono Destruído (novelas)","s":"tem","lido":false},{"t":"Coroa Cruel (novela)","s":"tem","lido":false}],"resumo":"Mare Barrow vive em um mundo dividido entre Silvers — com poderes mágicos — e Reds, sem poderes. Quando ela demonstra poderes impossíveis sendo de sangue vermelho, é escondida pela família real. Entre príncipes rivais e uma rebelião crescente, ninguém é de fiar. A série é ágil, com reviravoltas fortes e a lição de que qualquer um pode trair."},{"serie":"Red Rising","autor":"Pierce Brown","tipo":"serie","genero":"scifi","plano":null,"status":"misto","seq":[{"t":"1. Fúria Vermelha","s":"tem","lido":false},{"t":"2. Filho Dourado","s":"tem","lido":false},{"t":"3. Estrela da Manhã","s":"tem","lido":false},{"t":"4. Ferro e Ouro","s":"tem","lido":false},{"t":"5. Era das Trevas","s":"tem","lido":false},{"t":"6. Light Bringer — sem tradução PT-BR","s":"falta","lido":false},{"t":"7. Red God — aguarda lançamento","s":"lan","lido":false}],"resumo":"Darrow é um minerador do nível mais baixo de Marte, acreditando trabalhar pelo bem da humanidade. Ao descobrir uma grande mentira que sustenta toda a sociedade, é transformado para se infiltrar na elite e derrubá-la de dentro. A série começa como distopia e evolui para uma space opera épica. Pierce Brown cria uma das jornadas de herói mais emocionantes da ficção científica."},{"serie":"Reverência Indomável","autor":"Rebecca Ross","tipo":"unico","genero":"fantasia","plano":null,"status":"unico","seq":[{"t":"Reverência Indomável","s":"tem","lido":false}],"resumo":"Em um mundo onde a magia é extraída de criaturas sagradas, uma jovem descobre que seu dom de cura pode ser tanto uma benção quanto uma arma. Rebecca Ross constrói um romance de fantasia com uma protagonista gentil em um mundo que não recompensa a gentileza. O romance com o comandante que deveria ser seu inimigo é desenvolvido com cuidado. Uma fantasia de slow burn emocionalmente rica."},{"serie":"Safira de Prata / Diamante Dourado","autor":"Laura Reggiani","tipo":"serie","genero":"fantasia","plano":"lendo","ordemSug":2,"status":"completa","seq":[{"t":"Safira de Prata Vol. 1","s":"tem","lido":true},{"t":"Safira de Prata Vol.
